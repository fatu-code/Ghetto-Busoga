<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Depots - BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://backend-ghetto-busoga-production.up.railway.app" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* District tiles */
.dist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(214px,1fr));gap:14px}
.dist-tile{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .16s}
.dist-tile:hover{border-color:var(--green-mid);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.09)}
.dist-tile:hover .dt-go{background:var(--green);border-color:var(--green)}
.dist-tile:hover .dt-go svg{stroke:#fff}
.dt-head{display:flex;align-items:center;gap:12px;padding:16px 16px 15px}
.dt-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.dt-ic svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.dt-id{flex:1;min-width:0}
.dt-name{font-family:var(--font2);font-size:1.02rem;font-weight:800;color:var(--text);line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dt-code{font-family:var(--font);font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-top:3px}
.dt-go{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .16s}
.dt-go svg{width:12px;height:12px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all .16s}
.dt-stats{display:flex;border-top:1px solid var(--border)}
.dt-stat{flex:1;padding:11px 8px;text-align:center}
.dt-stat + .dt-stat{border-left:1px solid var(--border)}
.dt-stat .v{font-family:var(--font);font-size:1.35rem;color:var(--text);line-height:1}
.dt-stat .v.green{color:var(--green)}
.dt-stat .l{font-family:var(--font2);font-size:.59rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:5px}
/* Gamification: rank badge + depot coverage progress */
.dt-rank{width:24px;height:24px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:.72rem;color:var(--muted);flex-shrink:0}
.dt-rank.top{background:linear-gradient(135deg,#f7d774,#e0a800);border-color:#e0a800;color:#5a4500;box-shadow:0 3px 8px rgba(224,168,0,.4)}
.dt-cover{padding:11px 16px 14px}
.dt-cover-top{display:flex;justify-content:space-between;font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px}
.dt-cover-top b{color:var(--text);font-weight:900}
.dt-cover-bar{height:6px;background:var(--bg);border-radius:100px;overflow:hidden;border:1px solid var(--border)}
.dt-cover-fill{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green));border-radius:100px;transition:width .9s var(--ease)}

/* Depots within a district */
.back-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.sel-title{font-family:var(--font2);font-weight:900;color:var(--text);font-size:1rem}
.sel-title span{font-weight:700;color:var(--muted);font-size:.74rem;margin-left:7px}
.depot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:12px}
.depot-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .15s}
.depot-card:hover{border-color:var(--green-mid);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.depot-top{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.depot-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.depot-ic svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.depot-name{font-family:var(--font2);font-size:.95rem;font-weight:800;color:var(--text);line-height:1.15}
.depot-dist{font-family:var(--font2);font-size:.68rem;font-weight:600;color:var(--muted);margin-top:2px}
.depot-count{display:flex;align-items:baseline;gap:8px;border-top:1px solid var(--border);padding-top:13px}
.depot-count .num{font-family:var(--font);font-size:1.8rem;color:var(--green);line-height:1}
.depot-count .lbl{font-family:var(--font2);font-size:.74rem;font-weight:700;color:var(--muted)}
/* District committee panel */
.dlead-head{font-family:var(--font);font-size:.95rem;color:var(--text);margin-bottom:11px;display:flex;align-items:center;gap:9px}
.dlead-head svg{width:16px;height:16px;fill:var(--green)}
.dlead{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.dl-card{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1.5px solid var(--border);border-radius:14px;background:var(--bg)}
.dl-card.lead{background:linear-gradient(120deg,#0c4a2b,#0a7a3a);border-color:transparent}
.dl-card.filled{cursor:pointer;background:#fff}
.dl-card.filled:hover{border-color:var(--green-mid);box-shadow:0 6px 16px rgba(0,0,0,.07)}
.dl-card.lead.filled{background:linear-gradient(120deg,#0c4a2b,#0a7a3a)}
.dl-av{width:38px;height:38px;border-radius:11px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:800;font-size:.82rem;flex-shrink:0;overflow:hidden}
.dl-av svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.dl-card:not(.filled) .dl-av{background:var(--border);color:var(--muted)}
.dl-card.lead .dl-av{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.28)}
.dl-info{min-width:0}
.dl-name{font-family:var(--font2);font-weight:800;font-size:.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-card.lead .dl-name{color:#fff}
.dl-card:not(.filled) .dl-name{color:var(--muted);font-weight:700}
.dl-role{font-family:var(--font2);font-size:.6rem;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-card.lead .dl-role{color:rgba(255,255,255,.7)}
@media(max-width:760px){.dlead{grid-template-columns:repeat(2,1fr)}}
/* District drill: By Depot / All Members toggle */
.view-toggle{display:inline-flex;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:3px;gap:3px}
.vt-btn{font-family:var(--font2);font-size:.74rem;font-weight:800;color:var(--muted);background:none;border:none;padding:6px 13px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
.vt-btn:hover{color:var(--text)}
.vt-btn.active{background:#fff;color:var(--green-dark);box-shadow:0 2px 6px rgba(0,0,0,.08)}
/* District-wide member list */
.dm-wrap{overflow-x:auto}
.dm-table{width:100%;border-collapse:collapse;min-width:520px}
.dm-table th{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:12px 16px;border-bottom:1.5px solid var(--border);background:var(--bg)}
.dm-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-family:var(--font2);font-size:.82rem;color:var(--text)}
.dm-table tbody tr{cursor:pointer;transition:background .12s}
.dm-table tbody tr:last-child td{border-bottom:none}
.dm-table tbody tr:hover{background:var(--green-pale)}
.dm-serial{font-family:var(--font);color:var(--green);font-size:.8rem;white-space:nowrap}
.dm-name{font-weight:800;text-transform:uppercase}
.dm-muted{color:var(--muted)}
.dm-count{font-family:var(--font2);font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:9px}
.dp-edit,.dp-del{position:absolute;top:10px;width:27px;height:27px;border-radius:8px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.dp-edit svg,.dp-del svg{width:12px;height:12px;fill:none;stroke:var(--muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dp-edit{right:43px}
.dp-edit:hover{border-color:var(--green-mid);background:var(--green-pale)}
.dp-edit:hover svg{stroke:var(--green-dark)}
.dp-del{right:10px}
.dp-del:hover{border-color:#f5b7b1;background:#fdecec}
.dp-del:hover svg{stroke:#c0392b}

/* Hero */
.dp-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative;overflow:hidden;flex-wrap:wrap}
.dp-hero::after{content:"";position:absolute;right:-50px;top:-70px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.05)}
.dp-hero::before{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);pointer-events:none;animation:dpShimmer 6.5s ease-in-out infinite}
@keyframes dpShimmer{0%{left:-60%}60%{left:135%}100%{left:135%}}
.dp-hero-l{display:flex;align-items:center;gap:14px;position:relative;min-width:0}
.dp-hero-ic{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dp-hero-ic svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.dp-hero-t{font-family:var(--font);font-size:1.3rem;color:#fff;line-height:1.1}
.dp-hero-s{font-family:var(--font2);font-size:.74rem;font-weight:600;color:rgba(255,255,255,.6);margin-top:3px}
.dp-hero-fig{display:flex;gap:22px;text-align:right;position:relative}
.dp-hero-fig span{display:block;font-family:var(--font2);font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-bottom:3px}
.dp-hero-fig b{font-family:var(--font);font-size:1.5rem;font-weight:400}

/* Entrance */
@keyframes dpRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.dist-tile{animation:dpRise .45s var(--ease) backwards}
.dist-tile:nth-child(1){animation-delay:.03s}.dist-tile:nth-child(2){animation-delay:.06s}.dist-tile:nth-child(3){animation-delay:.09s}.dist-tile:nth-child(4){animation-delay:.12s}.dist-tile:nth-child(5){animation-delay:.15s}.dist-tile:nth-child(6){animation-delay:.18s}
.depot-card{animation:dpRise .4s var(--ease) backwards}
.depot-card:nth-child(1){animation-delay:.03s}.depot-card:nth-child(2){animation-delay:.06s}.depot-card:nth-child(3){animation-delay:.09s}.depot-card:nth-child(4){animation-delay:.12s}
/* Hover micro-interactions */
.dt-ic,.depot-ic{transition:transform .22s var(--ease)}
.dist-tile:hover .dt-ic,.depot-card:hover .depot-ic{transform:scale(1.08) rotate(-3deg)}
.dt-go svg{transition:transform .2s var(--ease),stroke .15s}
.dist-tile:hover .dt-go svg{transform:translateX(2px)}
@media (prefers-reduced-motion:reduce){.dp-hero::before{animation:none}.dist-tile,.depot-card{animation:none}.dist-tile:hover .dt-ic,.depot-card:hover .depot-ic,.dist-tile:hover .dt-go svg{transform:none}}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Depots</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green" id="depotRegBtn" style="display:none" onclick="goRegister()">
          <svg viewBox="0 0 16 16"><circle cx="6" cy="5" r="2.5"/><path d="M1.5 13c0-2.5 2-4.3 4.5-4.3s4.5 1.8 4.5 4.3"/><path d="M12.5 4.5v4M14.5 6.5h-4"/></svg>
          <span class="mob-hide">Register member</span>
        </button>
        <button class="btn" id="newDepotBtn" style="display:none" onclick="openDepotForm()">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
          <span class="mob-hide">New Depot</span>
        </button>
      </div>
    </div>

    <div class="content">
      <div id="depotHero"></div>
      <div id="depotsContainer">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<!-- CREATE / EDIT DEPOT MODAL -->
<div class="modal-bg" id="depotFormModal">
  <div class="modal-card" style="max-width:460px">
    <div class="modal-head">
      <div class="modal-title" id="dpTitle">New Depot</div>
      <button class="modal-close" onclick="closeModal('depotFormModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">District *</label>
        <select class="form-select" id="dpDistrict" onchange="updateDpSubCounties()"><option value="">Select district</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Depot Name (Ghetto Cell) *</label>
        <input class="form-input" id="dpName" placeholder="e.g. Masese">
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sub-County</label>
          <select class="form-select" id="dpSub" onchange="updateDpParishes()"><option value="">Select district first</option></select></div>
        <div class="form-group"><label class="form-label">Parish</label>
          <select class="form-select" id="dpParish"><option value="">Select sub-county first</option></select></div>
      </div>
      <div style="font-family:var(--font2);font-size:.72rem;color:var(--muted);line-height:1.5">Depots you create here appear in the depot dropdown when registering people. The sub-county and parish auto-fill on registration.</div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('depotFormModal')">Cancel</button>
      <button class="btn btn-green" id="dpSaveBtn" onclick="saveDepot()">
        <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Save Depot
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script src="js/depots.js"></script>
<script src="js/locations.js"></script>
<script src="js/register.js"></script>
<script>
Auth.require();
buildSidebar('depots');

let allMembers = [], counts = {}, selected = null, dpIntro = false;
// District drill view: 'depots' (cards) or 'members' (one flat list by serial).
let depotView = 'depots';
let dmQuery = ''; // search text for the All Members list

// One consistent brand green across every district (no rainbow).
const GREEN = '#009c41';

// Scoped users (RDC / Profiler) only ever see their own district's depots.
const _acc = accessOf(Auth.get());
const DISTS = _acc.scoped ? DISTRICTS.filter(d => d.code === _acc.district) : DISTRICTS;

// People who can register get a top-right "Register member" button.
if (_acc.canWrite) { const rb = document.getElementById('depotRegBtn'); if (rb) rb.style.display = ''; }
// Register a MEMBER in place (no navigating to the Beneficiaries list).
// Pre-fills the district when you are inside one; refreshes counts on success.
function goRegister() {
  openRegister({ district: selected || '', onDone: () => loadDepots() });
}

// Deep-link straight to a district: depots.html?district=JJA
// Scoped users land straight inside their own district.
selected = new URLSearchParams(location.search).get('district') || (_acc.scoped ? _acc.district : null);

async function loadDepots() {
  try {
    allMembers = await loadAllMembers();
    counts = {};
    allMembers.forEach(m => {
      const k = m.district + '||' + m.depot;
      counts[k] = (counts[k] || 0) + 1;
    });
    render();
  } catch (e) {
    showToast('Failed to load depots', 'error');
  }
}

function depotsForDistrict(code) {
  const known    = depotNamesFor(code); // real DB depots + static fallback
  const fromData = allMembers.filter(m => m.district === code).map(m => m.depot);
  return [...new Set([...known, ...fromData])].filter(Boolean).sort((a, b) => a.localeCompare(b));
}
function membersIn(code) { return allMembers.filter(m => m.district === code).length; }

function select(code) {
  selected = code;
  depotView = 'depots'; // always open a district on the depot view
  dmQuery = '';
  render();
  window.scrollTo(0, 0);
}

// Toggle the district drill between the depot cards and the flat member list.
function setDepotView(v) {
  depotView = v;
  dmQuery = '';
  render();
}

// Serial number from a member id like BGS-KLR-0015 -> 15 (for sorting).
function serialNo(id) {
  const p = String(id || '').split('-');
  return parseInt(p[p.length - 1], 10) || 0;
}

// District committee panel: the four district-level positions (Commander,
// Deputy Commander, Secretary, Publicity), labelled with the district name.
function districtLeadershipPanel(code) {
  const d = DISTRICTS.find(x => x.code === code);
  const dn = d ? d.name : code;
  const crown = '<svg viewBox="0 0 16 16"><path d="M2 12.5h12M3 12.5l-1-6.5 3.6 3.2L8 4l2.4 5.2L14 6l-1 6.5"/></svg>';
  const cards = DISTRICT_ROLES.map((role, i) => {
    const L = allMembers.find(m => m.district === code && m.depot_role === role);
    const label = roleDisplay(role, dn); // e.g. "Luuka Commander"
    const av = L ? initials(L.name) : (i === 0 ? crown : '?');
    return `<div class="dl-card${L ? ' filled' : ''}${i === 0 ? ' lead' : ''}" ${L ? `onclick="location.href='member.html?id=${L.id}'"` : ''}>
        <div class="dl-av">${av}</div>
        <div class="dl-info"><div class="dl-name">${L ? L.name : 'Vacant'}</div><div class="dl-role">${label}</div></div>
      </div>`;
  }).join('');
  return `<div class="dlead-head"><svg viewBox="0 0 16 16">${'<path d="M8 1.2l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.7 3.9 13l.7-4.3-3.1-3 4.3-.6z"/>'}</svg> ${dn} District Leadership</div>
    <div class="dlead">${cards}</div>`;
}

// Re-filter the All Members list as the user types, without re-rendering the
// search box (so focus and the cursor stay put). Handles 1000s of names fine.
function filterDistrictMembers() {
  const el = document.getElementById('dmSearch');
  dmQuery = el ? el.value : '';
  const list = document.getElementById('dmList');
  if (list) list.innerHTML = districtMembersTable(selected);
}

// The filtered, serial-ordered member list for a district (used by the table,
// print and CSV export so they always match what's on screen).
function getDistrictMembers(code) {
  const q = dmQuery.trim().toLowerCase();
  let list = allMembers.filter(m => m.district === code);
  if (q) list = list.filter(m =>
    (m.name || '').toLowerCase().includes(q) ||
    (m.id || '').toLowerCase().includes(q) ||
    (m.depot || '').toLowerCase().includes(q));
  return list.sort((a, b) => serialNo(a.id) - serialNo(b.id));
}

// One flat, serial-ordered list of every member in a district (all depots),
// filtered by the search box (name, serial or depot).
function districtMembersTable(code) {
  const q = dmQuery.trim();
  const total = allMembers.filter(m => m.district === code).length;
  const list = getDistrictMembers(code);

  const count = `<div class="dm-count">${list.length} of ${total} member${total === 1 ? '' : 's'}${q ? ` matching "${q}"` : ''}</div>`;
  if (!list.length)
    return count + `<div class="card"><div class="empty-state"><div class="empty-title">${total ? 'No match' : 'No members in this district yet'}</div></div></div>`;
  const rows = list.map(m => `
    <tr onclick="location.href='member.html?id=${m.id}'">
      <td class="dm-serial">${m.id}</td>
      <td class="dm-name">${m.name}</td>
      <td class="dm-muted">${titleCase(m.depot)}</td>
      <td class="dm-muted">${m.depot_role ? roleDisplay(m.depot_role, m.district_name) : '-'}</td>
    </tr>`).join('');
  return count + `<div class="card" style="padding:0;overflow:hidden"><div class="dm-wrap">
    <table class="dm-table">
      <thead><tr><th>Serial</th><th>Name</th><th>Depot</th><th>Role</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

// Export the current district roll (what's on screen, search applied) to CSV.
function exportDistrictCSV() {
  const d = DISTRICTS.find(x => x.code === selected);
  const list = getDistrictMembers(selected);
  if (!list.length) { showToast('Nothing to export', 'error'); return; }
  const esc = v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
  const head = ['Serial', 'Name', 'Gender', 'Phone', 'NIN', 'Sub-County', 'Parish', 'Village', 'Depot', 'Role', 'Status'];
  const lines = list.map(m => [m.id, m.name, m.gender, m.phone, m.nin, m.sub_county, m.parish, m.village, m.depot, m.depot_role, m.status].map(esc).join(','));
  const csv = '﻿' + head.map(esc).join(',') + '\r\n' + lines.join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `${(d ? d.name : 'district').replace(/\s+/g, '-')}-members.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(a.href);
}

function render() {
  setHero();
  if (DISTRICTS.find(d => d.code === selected)) renderDepots(selected);
  else { selected = null; renderDistricts(); }
  if (!dpIntro) {
    dpIntro = true;
    requestAnimationFrame(() => {
      document.querySelectorAll('.cup').forEach(animateUp);
      document.querySelectorAll('.dt-cover-fill').forEach(f => {
        const w = f.style.width; f.style.width = '0';
        requestAnimationFrame(() => { f.style.width = w; });
      });
    });
  }
}

// Green page hero with the depot + member totals (scoped to the user's district).
function setHero() {
  const totalDepots  = DISTS.reduce((s, d) => s + depotsForDistrict(d.code).length, 0);
  const totalMembers = DISTS.reduce((s, d) => s + membersIn(d.code), 0);
  const scoped = _acc.scoped;
  document.getElementById('depotHero').innerHTML = `
    <div class="dp-hero">
      <div class="dp-hero-l">
        <div class="dp-hero-ic"><svg viewBox="0 0 16 16"><path d="M1.5 6.5L8 2l6.5 4.5V14h-13z"/><path d="M5.5 14V9h5v5"/></svg></div>
        <div>
          <div class="dp-hero-t">${scoped ? (DISTS[0] ? DISTS[0].name : 'Depots') : 'Depot Network'}</div>
          <div class="dp-hero-s">Ghetto cells${scoped ? '' : ' across Busoga'}, organised by district</div>
        </div>
      </div>
      <div class="dp-hero-fig">
        <div><span>Depots</span><b class="cup" data-to="${totalDepots}">${totalDepots}</b></div>
        <div><span>Members</span><b class="cup" data-to="${totalMembers}">${fmt(totalMembers)}</b></div>

      </div>

}

// Count a number up from zero on first load.
function animateUp(el) {
  const to = Number(el.dataset.to) || 0;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) { el.textContent = fmt(to); return; }
  const dur = 850, start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / dur), e = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(Math.round(to * e));
    if (p < 1) requestAnimationFrame(tick); else el.textContent = fmt(to);
  }
  requestAnimationFrame(tick);
}

function renderDistricts() {
  // New Depot belongs to a district, so hide it on the all-districts view.
  const nb = document.getElementById('newDepotBtn');
  if (nb) nb.style.display = 'none';
  // Octalysis: rank districts by members profiled - a profiling leaderboard.
  const ranked = DISTS.map(d => ({ d, dc: depotsForDistrict(d.code).length, mc: membersIn(d.code) }))
    .sort((a, b) => b.mc - a.mc || b.dc - a.dc);
  const tiles = ranked.map((r, i) => {
    const { d, dc, mc } = r;
    return `
      <div class="dist-tile" style="border-top:3px solid ${GREEN}" onclick="select('${d.code}')">
        <div class="dt-head">
          <div class="dt-ic" style="background:${GREEN}"><svg viewBox="0 0 16 16"><path d="M8 1.5C5.2 1.5 3 3.6 3 6.3 3 9.8 8 14.5 8 14.5s5-4.7 5-8.2C13 3.6 10.8 1.5 8 1.5z"/><circle cx="8" cy="6.2" r="1.7"/></svg></div>
          <div class="dt-id"><div class="dt-name">${d.name}</div><div class="dt-code">${d.code}</div></div>
          <div class="dt-go"><svg viewBox="0 0 16 16"><path d="M6 3l5 5-5 5"/></svg></div>
        </div>
        <div class="dt-stats">
          <div class="dt-stat"><div class="v cup" data-to="${dc}">${dc}</div><div class="l">Depots</div></div>
          <div class="dt-stat"><div class="v cup" data-to="${mc}" style="color:${GREEN}">${fmt(mc)}</div><div class="l">Members</div></div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('depotsContainer').innerHTML = `<div class="dist-grid">${tiles}</div>`;
  document.getElementById('countLabel').textContent = DISTS.length === 1
    ? `${DISTS[0].name} · ${fmt(allMembers.length)} members profiled`
    : `${DISTS.length} districts · ${fmt(allMembers.length)} members profiled`;
}

function renderDepots(code) {
  // "Add depot" only makes sense in the depot view.
  const nb = document.getElementById('newDepotBtn');
  if (nb) nb.style.display = (_acc.isAdmin && depotView === 'depots') ? '' : 'none';
  const d   = DISTRICTS.find(x => x.code === code);
  const col = GREEN;
  const depots = depotsForDistrict(code);
  const mc = membersIn(code);

  const toggle = `
    <div class="view-toggle">
      <button class="vt-btn ${depotView === 'depots' ? 'active' : ''}" onclick="setDepotView('depots')">By Depot</button>
      <button class="vt-btn ${depotView === 'members' ? 'active' : ''}" onclick="setDepotView('members')">All Members</button>
    </div>`;

  const header = `
    <div class="back-row">
      <button class="btn btn-sm" onclick="select(null)"><svg viewBox="0 0 16 16"><path d="M10 3L5 8l5 5"/></svg> All districts</button>
      <div class="sel-title">${d.name}<span>${depots.length} depots · ${mc} members</span></div>
      <div style="margin-left:auto">${toggle}</div>
    </div>
    ${districtLeadershipPanel(code)}`;

  let body;
  if (depotView === 'members') {
    body = `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">
        <div class="search-wrap" style="flex:1;min-width:220px;max-width:420px;margin:0">
          <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
          <input class="search-input" id="dmSearch" type="text" placeholder="Search this district by name, serial or depot..." oninput="filterDistrictMembers()" value="${dmQuery.replace(/"/g, '&quot;')}">
        </div>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button class="btn btn-sm" onclick="exportDistrictCSV()"><svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><path d="M8 1.5v8M5 7l3 2.5L11 7M3 12.5h10"/></svg> <span class="mob-hide">Export CSV</span></button>
          <button class="btn btn-sm" onclick="printDistrictRoll()"><svg viewBox="0 0 16 16" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><rect x="3" y="6" width="10" height="6" rx="1"/><path d="M4.5 6V2.5h7V6M5 9.5h6"/></svg> <span class="mob-hide">Print</span></button>
        </div>
      </div>
      <div id="dmList">${districtMembersTable(code)}</div>`;
  } else {
    const cards = depots.map(dep => {
      const cnt = counts[code + '||' + dep] || 0;
      const rec = depotRecord(code, dep);
      const loc = (rec && rec.sub_county) ? rec.sub_county : d.name;
      return `
        <div class="depot-card" style="border-top:3px solid ${col}" onclick="location.href='members.html?district=${code}&depot=${encodeURIComponent(dep)}'">
          <div class="depot-top">
            <div class="depot-ic" style="background:${col}"><svg viewBox="0 0 16 16"><path d="M1.5 6.5L8 2l6.5 4.5V14h-13z"/><path d="M5.5 14V9h5v5"/></svg></div>
            <div><div class="depot-name">${titleCase(dep)}</div><div class="depot-dist">${loc}</div></div>
          </div>
          <div class="depot-count"><span class="num cup-d" data-to="${cnt}" style="color:${col}">${cnt}</span><span class="lbl">member${cnt === 1 ? '' : 's'} profiled</span></div>
        </div>`;
    }).join('');
    body = `<div class="depot-grid">${cards || '<div class="card"><div class="empty-state"><div class="empty-title">No depots</div></div></div>'}</div>`;
  }

  document.getElementById('depotsContainer').innerHTML = header + body;

  document.getElementById('countLabel').textContent =
    `${d.name} · ${depots.length} depots · ${fmt(mc)} members`;

  // Count the depot member numbers up when showing the depot cards.
  if (depotView === 'depots')
    requestAnimationFrame(() => document.querySelectorAll('.cup-d').forEach(animateUp));
}

// ── DEPOT MANAGEMENT (admin) ───────────────────────────────────────
DISTRICTS.forEach(d => {
  const o = document.createElement('option');
  o.value = d.code; o.textContent = d.name;
  document.getElementById('dpDistrict').appendChild(o);
});
// Visibility of the New Depot button is controlled by the view (district only).

// Cascading Sub-County -> Parish from LOCATIONS (the district reference data)
function updateDpSubCounties() {
  const code = document.getElementById('dpDistrict').value;
  const subs = (typeof LOCATIONS !== 'undefined' && LOCATIONS[code] && Object.keys(LOCATIONS[code])) || [];
  document.getElementById('dpSub').innerHTML =
    '<option value="">' + (code ? 'Select sub-county' : 'Select district first') + '</option>' +
    subs.map(s => `<option>${s}</option>`).join('');
  updateDpParishes();
}
function updateDpParishes() {
  const code = document.getElementById('dpDistrict').value;
  const sub  = document.getElementById('dpSub').value;
  const parishes = (typeof LOCATIONS !== 'undefined' && LOCATIONS[code] && LOCATIONS[code][sub]) || [];
  document.getElementById('dpParish').innerHTML =
    '<option value="">' + (sub ? 'Select parish' : 'Select sub-county first') + '</option>' +
    parishes.map(p => `<option>${p}</option>`).join('');
}
// Set a select to a value, adding the option first if it isn't in the list (legacy entries).
function dpSetSelect(sel, val) {
  if (!sel) return;
  if (val && ![...sel.options].some(o => o.value === val || o.textContent === val)) {
    sel.insertAdjacentHTML('beforeend', `<option>${val}</option>`);
  }
  sel.value = val || '';
}

let editingDepotId = null;
function openDepotForm(id) {
  const rec = id ? DEPOTS_DB.find(x => x.id === id) : null;
  editingDepotId = rec ? rec.id : null;
  document.getElementById('dpTitle').textContent = rec ? 'Edit Depot' : 'New Depot';
  const dd = document.getElementById('dpDistrict');
  dd.value = rec ? rec.district : (DISTRICTS.find(x => x.code === selected) ? selected : '');
  dd.disabled = !!rec;
  document.getElementById('dpName').value = rec ? rec.name : '';
  // Cascade: sub-counties for the district, then parishes for the sub-county
  updateDpSubCounties();
  dpSetSelect(document.getElementById('dpSub'), rec ? rec.sub_county : '');
  updateDpParishes();
  dpSetSelect(document.getElementById('dpParish'), rec ? rec.parish : '');
  openModal('depotFormModal');
}

async function saveDepot() {
  const district   = document.getElementById('dpDistrict').value;
  const name       = document.getElementById('dpName').value.trim();
  const sub_county = document.getElementById('dpSub').value.trim();
  const parish     = document.getElementById('dpParish').value.trim();
  if (!district || !name) { showToast('District and depot name are required', 'error'); return; }
  const district_name = (DISTRICTS.find(x => x.code === district) || {}).name || district;
  const btn = document.getElementById('dpSaveBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Saving...';
  try {
    if (editingDepotId) {
      await apiFetch(`/api/depots/${editingDepotId}`, { method: 'PUT', body: { name, sub_county, parish } });
      showToast('Depot updated');
    } else {
      await apiFetch('/api/depots', { method: 'POST', body: { district, district_name, name, sub_county, parish } });
      showToast('Depot created');
    }
    await loadDepotsDB();
    closeModal('depotFormModal');
    render();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Save Depot';
  }
}

(async () => { await loadDepotsDB(); loadDepots(); })();
</script>

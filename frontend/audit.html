<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audit Log — BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
.au-item{display:flex;gap:12px;padding:12px 2px;border-bottom:1px solid var(--border)}
.au-item:last-child{border-bottom:none}
.au-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.au-ic svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.au-detail{font-family:var(--font2);font-size:.85rem;font-weight:700;color:var(--text);line-height:1.4}
.au-meta{font-family:var(--font2);font-size:.68rem;font-weight:600;color:var(--muted);margin-top:3px}
.au-meta b{color:var(--text);font-weight:800}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Audit Log</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
      <div class="topbar-right">
        <select class="filter-select" id="filterCat" onchange="render()">
          <option value="">All activity</option>
          <option value="member">Beneficiaries</option>
          <option value="repayment">Repayments</option>
          <option value="user">Staff</option>
        </select>
      </div>
    </div>

    <div class="content">
      <div id="auditContainer">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.guard(['admin'], 'depots.html');
buildSidebar('audit');

let entries = [];

const META = {
  'member.create':   { label: 'Registration',  color: '#0ea5e9', icon: '<circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/>' },
  'member.disburse': { label: 'Disbursement',  color: '#009c41', icon: '<path d="M8 1.5v13M4.5 5h5a2.2 2.2 0 010 4.4H5.5"/>' },
  'member.update':   { label: 'Edit',          color: '#7a8e83', icon: '<path d="M11 2l3 3-9 9H2v-3L11 2z"/>' },
  'member.delete':   { label: 'Deletion',      color: '#c0392b', icon: '<path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/>' },
  'repayment.add':   { label: 'Repayment',     color: '#14b8a6', icon: '<path d="M8 1.5v13M4.5 5h5a2.2 2.2 0 010 4.4H5.5"/>' },
  'user.create':     { label: 'Staff added',   color: '#8b5cf6', icon: '<circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/>' },
  'user.update':     { label: 'Staff updated', color: '#8b5cf6', icon: '<path d="M11 2l3 3-9 9H2v-3L11 2z"/>' },
  'user.delete':     { label: 'Staff removed', color: '#c0392b', icon: '<path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/>' },
};
function metaOf(a) { return META[a] || { label: a || 'Activity', color: '#7a8e83', icon: '<circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/>' }; }
function when(d) {
  const x = new Date(d);
  if (isNaN(x)) return '';
  return x.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function loadAudit() {
  try {
    const data = await apiFetch('/api/audit?limit=400');
    entries = data.entries || [];
    render();
  } catch (e) {
    document.getElementById('auditContainer').innerHTML =
      `<div class="card"><div class="empty-state"><div class="empty-title">Administrators only</div><div class="empty-sub">${e.message}</div></div></div>`;
    document.getElementById('countLabel').textContent = '';
  }
}

function render() {
  const cat = document.getElementById('filterCat').value;
  const rows = entries.filter(e => !cat || (e.action || '').startsWith(cat));
  document.getElementById('countLabel').textContent = `${fmt(rows.length)} event${rows.length === 1 ? '' : 's'}`;

  document.getElementById('auditContainer').innerHTML = rows.length
    ? `<div class="card">${rows.map(e => {
        const m = metaOf(e.action);
        return `<div class="au-item">
          <div class="au-ic" style="background:${m.color}"><svg viewBox="0 0 16 16">${m.icon}</svg></div>
          <div>
            <div class="au-detail">${e.detail || m.label}</div>
            <div class="au-meta">${m.label} &middot; by <b>${e.user_name || 'System'}</b> &middot; ${when(e.created_at)}</div>
          </div>
        </div>`;
      }).join('')}</div>`
    : `<div class="card"><div class="empty-state"><div class="empty-title">No activity${cat ? ' in this category' : ' yet'}</div><div class="empty-sub">Actions are recorded here as staff register, disburse, and record repayments.</div></div></div>`;
}

loadAudit();
</script>
</body>
</html>

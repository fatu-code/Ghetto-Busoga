<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Repayments — BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* Collection progress hero */
.rp-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.rp-hero::after{content:"";position:absolute;right:-40px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
.rp-hero-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;position:relative}
.rp-hero-l{font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.6)}
.rp-hero-v{font-family:var(--font);font-size:2.1rem;line-height:1;margin-top:7px}
.rp-hero-v span{font-family:var(--font2);font-size:.85rem;font-weight:700;color:rgba(255,255,255,.6)}
.rp-hero-fig{display:flex;gap:24px;text-align:right}
.rp-hero-fig span{display:block;font-family:var(--font2);font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-bottom:3px}
.rp-hero-fig b{font-family:var(--font);font-size:1.05rem;font-weight:400}
.rp-hero-bar{height:9px;background:rgba(255,255,255,.16);border-radius:100px;margin-top:16px;overflow:hidden;position:relative}
.rp-hero-fill{height:100%;background:linear-gradient(90deg,#b3e6c8,#5fd99a);border-radius:100px;transition:width 1s var(--ease)}
.rp-hero::before{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);pointer-events:none;animation:rpShimmer 6.5s ease-in-out infinite}
@keyframes rpShimmer{0%{left:-60%}60%{left:135%}100%{left:135%}}
@media (prefers-reduced-motion:reduce){.rp-hero::before{animation:none}}

/* Stat tiles with icon + accent bar */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:12px;margin-bottom:20px}
.sum-card{position:relative;overflow:hidden;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:15px 16px 15px 19px;display:flex;align-items:center;gap:13px;transition:all .16s}
.sum-card:hover{border-color:var(--green-mid);box-shadow:0 10px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.sum-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.sum-card.due::before{background:#3b82f6}.sum-card.out::before{background:#c0392b}.sum-card.ovd::before{background:var(--amber)}
.sum-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--green-pale);border:1.5px solid var(--green-mid)}
.sum-ic svg{width:18px;height:18px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sum-card.due .sum-ic{background:var(--blue-pale);border-color:var(--blue-mid)}.sum-card.due .sum-ic svg{stroke:#3b82f6}
.sum-card.out .sum-ic{background:#fdecec;border-color:#f5b7b1}.sum-card.out .sum-ic svg{stroke:#c0392b}
.sum-card.ovd .sum-ic{background:var(--amber-pale);border-color:var(--amber-mid)}.sum-card.ovd .sum-ic svg{stroke:var(--amber)}
.sum-l{font-family:var(--font2);font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sum-v{font-family:var(--font);font-size:1.25rem;color:var(--text);margin-top:4px;line-height:1}
.sum-v.green{color:var(--green)}.sum-v.red{color:#c0392b}.sum-v.amber{color:#b06a00}

.lp{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:100px;display:inline-block}
.lp.rep{background:#fff5e6;color:#b06a00;border:1px solid #ffd699}
.lp.over{background:#fdecec;color:#c0392b;border:1px solid #f5b7b1}
.lp.clr{background:#eaf7f0;color:#007a33;border:1px solid #b3e6c8}
.r-money{font-family:var(--font);font-weight:800}

/* District section as a card with coloured header + collection bar */
.dsec{margin-bottom:16px;background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.dhead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 16px}
.dhead-l{display:flex;align-items:center;gap:12px;min-width:0}
.dhead-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.dhead-ic svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.dhead .dn{font-family:var(--font2);font-weight:900;color:var(--text);font-size:1rem;line-height:1.1}
.dhead .dsub{font-family:var(--font2);font-size:.68rem;font-weight:700;color:var(--muted);margin-top:2px}
.dchips{display:flex;gap:7px;flex-wrap:wrap}
.dchip{font-family:var(--font2);font-size:.64rem;font-weight:800;padding:5px 10px;border-radius:100px;background:var(--bg);color:var(--text);border:1px solid var(--border);white-space:nowrap}
.dchip.out{background:#fdecec;color:#c0392b;border-color:#f5b7b1}
.dchip.ovd{background:var(--amber-pale);color:#b06a00;border-color:var(--amber-mid)}
.dprog{height:5px;background:var(--bg)}
.dprog-fill{height:100%;transition:width .9s var(--ease)}

/* Gamification: tiers, ranks, milestone ticks */
.rp-tier{font-family:var(--font2);font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:100px;background:rgba(255,255,255,.16);color:#fff;margin-left:9px;vertical-align:middle}
.rp-hero-next{font-family:var(--font2);font-size:.66rem;font-weight:700;color:rgba(255,255,255,.58);margin-top:7px;display:flex;align-items:center;gap:6px}
.rp-hero-next svg{width:12px;height:12px;fill:none;stroke:#b3e6c8;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.rp-tick{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.32);border-radius:2px}
.drank{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:.78rem;color:var(--muted);flex-shrink:0}
.drank.top{background:linear-gradient(135deg,#f7d774,#e0a800);border-color:#e0a800;color:#5a4500;box-shadow:0 3px 9px rgba(224,168,0,.45)}
.tier{font-family:var(--font2);font-size:.55rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:100px;border:1px solid;margin-left:8px;vertical-align:middle;white-space:nowrap}
.tier.exc{background:var(--green-pale);color:#007a33;border-color:var(--green-mid)}
.tier.str{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.tier.bld{background:var(--amber-pale);color:#b06a00;border-color:var(--amber-mid)}
.tier.erl{background:var(--bg);color:var(--muted);border-color:var(--border)}

/* ── MOBILE: each loan row becomes a clean stacked block (no sideways scroll) ── */
@media (max-width:600px){
  .sum-grid{gap:10px}
  .sum-v{font-size:1.15rem}
  .rp-hero-v{font-size:1.7rem}
  .rp-hero-fig{gap:16px}
  .dhead{padding:13px 14px}
  .dsec .table-wrap{overflow:visible}
  /* The table element itself must become block flow, or rows collapse to content width */
  .dsec table,.dsec tbody,.dsec tr{display:block;width:100%}
  .dsec table{min-width:0}
  .dsec thead{display:none}
  .dsec tbody tr{padding:13px 16px;border-top:1px solid var(--border)}
  .dsec tbody tr:hover{background:transparent}
  .dsec td{display:flex;width:100%;justify-content:space-between;align-items:center;gap:12px;padding:7px 0;border:none;text-align:right}
  .dsec td::before{content:attr(data-label);font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);text-align:left;flex-shrink:0}
  .dsec td:first-child{display:block;text-align:left;padding:0 0 10px;margin-bottom:8px;border-bottom:1px solid var(--border)}
  .dsec td:first-child::before{display:none}
  .dsec td:last-child{padding-bottom:0}
}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Repayments</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green" onclick="printReport()">
          <svg viewBox="0 0 16 16"><path d="M4 6V2h8v4"/><rect x="2" y="6" width="12" height="6" rx="1"/><path d="M4 12h8v3H4z"/></svg>
          <span class="mob-hide">Print</span>
        </button>
      </div>
    </div>

    <div class="content">
      <div class="filter-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search by name or serial..." oninput="render()">
        </div>
        <select class="filter-select" id="filterDistrict" onchange="render()"><option value="">All districts</option></select>
        <select class="filter-select" id="filterStatus" onchange="render()">
          <option value="">All statuses</option>
          <option value="Overdue">Overdue</option>
          <option value="Repaying">Repaying</option>
          <option value="Cleared">Cleared</option>
        </select>
      </div>

      <div id="repayContainer">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.guard(['admin', 'rdc'], 'depots.html');
buildSidebar('repayments');

DISTRICTS.forEach(d => {
  const o = document.createElement('option');
  o.value = d.code; o.textContent = d.name;
  document.getElementById('filterDistrict').appendChild(o);
});

let loans = [];
let rpIntro = false;
let lastView = null;
// A distinct accent colour per district, to match the rest of the app.
const COLORS = ['#009c41','#0ea5e9','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#ef4444','#6366f1','#f97316','#06b6d4','#84cc16','#d946ef'];

// Octalysis: Development & Accomplishment — a collection tier per performance.
function tierFor(pct) {
  if (pct >= 80) return { label: 'Excellent', cls: 'exc' };
  if (pct >= 50) return { label: 'Strong', cls: 'str' };
  if (pct >= 20) return { label: 'Building', cls: 'bld' };
  return { label: 'Low', cls: 'erl' };
}

function dueDate(d) {
  if (!d) return null;
  const x = new Date(d);
  if (isNaN(x)) return null;
  x.setMonth(x.getMonth() + 12);
  return x;
}

async function loadRepayments() {
  try {
    const members = (await loadAllMembers()).filter(m => Number(m.amount) > 0); // only disbursed
    loans = members.map(m => {
      const principal   = Number(m.amount) || 0;
      const totalDue     = Math.round(principal * 1.06);
      const repaid      = Number(m.repaid) || 0;
      const outstanding = Math.max(0, totalDue - repaid);
      const due         = dueDate(m.disbursement_date);
      const cleared     = outstanding <= 0;
      const overdue     = !cleared && due && new Date() > due;
      const status      = cleared ? 'Cleared' : overdue ? 'Overdue' : 'Repaying';
      return { m, principal, totalDue, repaid, outstanding, due, status };
    });
    render();
  } catch (e) {
    showToast('Failed to load repayments', 'error');
  }
}

function render() {
  const q      = document.getElementById('searchInput').value.trim().toLowerCase();
  const dist   = document.getElementById('filterDistrict').value;
  const stat   = document.getElementById('filterStatus').value;

  const rows = loans.filter(L =>
    (!dist || L.m.district === dist) &&
    (!stat || L.status === stat) &&
    (!q || L.m.name.toLowerCase().includes(q) || L.m.id.toLowerCase().includes(q))
  );

  // Summary over the filtered set
  const sumDue  = rows.reduce((s, L) => s + L.totalDue, 0);
  const sumRep  = rows.reduce((s, L) => s + L.repaid, 0);
  const sumOut  = rows.reduce((s, L) => s + L.outstanding, 0);
  const overdue = rows.filter(L => L.status === 'Overdue').length;

  document.getElementById('countLabel').textContent =
    `${fmt(rows.length)} disbursed loan${rows.length === 1 ? '' : 's'}`;

  const pct = sumDue ? Math.round((sumRep / sumDue) * 100) : 0;
  lastView = { rows, sumDue, sumRep, sumOut, overdue, pct };
  const tier = tierFor(pct);
  const nextMs = [25, 50, 75, 100].find(m => m > pct);
  const toNext = !sumDue ? 'No disbursed loans yet'
    : nextMs ? `${nextMs - pct}% to the ${nextMs}% milestone` : 'Fully collected. Outstanding cleared.';
  const summary = `
    <div class="rp-hero">
      <div class="rp-hero-top">
        <div>
          <div class="rp-hero-l">Loan collection<span class="rp-tier">${tier.label}</span></div>
          <div class="rp-hero-v"><span class="cup" data-to="${pct}" data-suf="%">${pct}%</span> <span>collected</span></div>
          <div class="rp-hero-next"><svg viewBox="0 0 16 16"><path d="M8 1.5l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.7 3.9 13l.7-4.3-3.1-3 4.3-.6z"/></svg>${toNext}</div>
        </div>
        <div class="rp-hero-fig">
          <div><span>Repaid</span><b class="cup" data-to="${sumRep}" data-pre="UGX " style="color:#b3e6c8">UGX ${fmt(sumRep)}</b></div>
          <div><span>Outstanding</span><b class="cup" data-to="${sumOut}" data-pre="UGX ">UGX ${fmt(sumOut)}</b></div>
        </div>
      </div>
      <div class="rp-hero-bar">
        <div class="rp-hero-fill" style="width:${pct}%"></div>
        <span class="rp-tick" style="left:25%"></span>
        <span class="rp-tick" style="left:50%"></span>
        <span class="rp-tick" style="left:75%"></span>
      </div>
    </div>
    <div class="sum-grid">
      <div class="sum-card due"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M8 1.5v13M4.5 5h5a2.2 2.2 0 010 4.4H5.5"/></svg></div><div><div class="sum-l">Total Due</div><div class="sum-v cup" data-to="${sumDue}" data-pre="UGX ">UGX ${fmt(sumDue)}</div></div></div>
      <div class="sum-card"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg></div><div><div class="sum-l">Repaid</div><div class="sum-v green cup" data-to="${sumRep}" data-pre="UGX ">UGX ${fmt(sumRep)}</div></div></div>
      <div class="sum-card out"><div class="sum-ic"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg></div><div><div class="sum-l">Outstanding</div><div class="sum-v red cup" data-to="${sumOut}" data-pre="UGX ">UGX ${fmt(sumOut)}</div></div></div>
      <div class="sum-card ovd"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M8 1.7l6.3 11.1a.6.6 0 01-.5.9H2.2a.6.6 0 01-.5-.9z"/><path d="M8 6.3v3.1M8 11.4v.2"/></svg></div><div><div class="sum-l">Overdue</div><div class="sum-v amber cup" data-to="${overdue}">${fmt(overdue)}</div></div></div>
    </div>`;

  const rowHtml = L => `
    <tr class="clickable" onclick="location.href='member.html?id=${L.m.id}'">
      <td data-label="Beneficiary"><div style="font-weight:800">${L.m.name}</div><div style="font-family:var(--font);color:var(--green);font-size:.72rem">${L.m.id}</div></td>
      <td data-label="Depot" style="color:var(--muted)">${L.m.depot}</td>
      <td data-label="Total Due" class="r-money">UGX ${fmt(L.totalDue)}</td>
      <td data-label="Repaid" class="r-money" style="color:var(--green)">UGX ${fmt(L.repaid)}</td>
      <td data-label="Outstanding" class="r-money" style="color:${L.outstanding > 0 ? '#c0392b' : 'var(--green)'}">UGX ${fmt(L.outstanding)}</td>
      <td data-label="Due" style="color:var(--muted)">${L.due ? formatDate(L.due) : '-'}</td>
      <td data-label="Status"><span class="lp ${L.status === 'Overdue' ? 'over' : L.status === 'Cleared' ? 'clr' : 'rep'}">${L.status}</span></td>
    </tr>`;

  // Octalysis: Social Influence — rank districts by collection (a leaderboard),
  // best performer on top with a gold rank badge.
  const dstats = DISTRICTS.map(d => {
    const dr = rows.filter(L => L.m.district === d.code);
    if (!dr.length) return null;
    const due = dr.reduce((s, L) => s + L.totalDue, 0);
    const rep = dr.reduce((s, L) => s + L.repaid, 0);
    const out = dr.reduce((s, L) => s + L.outstanding, 0);
    const od  = dr.filter(L => L.status === 'Overdue').length;
    const dpct = due ? Math.round((rep / due) * 100) : 0;
    const col = COLORS[DISTRICTS.findIndex(x => x.code === d.code) % COLORS.length];
    return { d, dr, due, rep, out, od, dpct, col };
  }).filter(Boolean).sort((a, b) => b.dpct - a.dpct || b.rep - a.rep);

  const sections = dstats.map((s, i) => {
    const t = tierFor(s.dpct);
    return `
      <div class="dsec">
        <div class="dhead">
          <div class="dhead-l">
            <span class="drank${i === 0 ? ' top' : ''}">${i + 1}</span>
            <div class="dhead-ic" style="background:${s.col}"><svg viewBox="0 0 16 16"><path d="M8 1.5l5 2v4c0 3.5-2.5 5.6-5 6.5-2.5-.9-5-3-5-6.5v-4z"/></svg></div>
            <div style="min-width:0"><div class="dn">${s.d.name}<span class="tier ${t.cls}">${t.label}</span></div><div class="dsub">${s.dr.length} loan${s.dr.length === 1 ? '' : 's'} &middot; ${s.dpct}% collected</div></div>
          </div>
          <div class="dchips">
            <span class="dchip">Due UGX ${fmt(s.due)}</span>
            <span class="dchip out">Outstanding UGX ${fmt(s.out)}</span>
            ${s.od ? `<span class="dchip ovd">${s.od} overdue</span>` : ''}
          </div>
        </div>
        <div class="dprog"><div class="dprog-fill" style="width:${s.dpct}%;background:${s.col}"></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Beneficiary</th><th>Depot</th><th>Total Due</th><th>Repaid</th><th>Outstanding</th><th>Due</th><th>Status</th></tr></thead>
          <tbody>${s.dr.map(rowHtml).join('')}</tbody>
        </table></div>
      </div>`;
  }).join('');

  const body = rows.length ? sections
    : `<div class="card"><div class="empty-state">
        <div class="empty-title">No disbursed loans${dist || stat || q ? ' match this filter' : ' yet'}</div>
        <div class="empty-sub">Repayments appear here once beneficiaries have been disbursed.</div>
      </div></div>`;

  document.getElementById('repayContainer').innerHTML = summary + body;

  // Grow the bars + count the numbers up once on first load (not on filtering).
  if (!rpIntro) {
    rpIntro = true;
    requestAnimationFrame(() => {
      document.querySelectorAll('.rp-hero-fill, .dprog-fill').forEach(f => {
        const w = f.style.width; f.style.width = '0';
        requestAnimationFrame(() => { f.style.width = w; });
      });
      document.querySelectorAll('.cup').forEach(animateUp);
    });
  }
}

// Count a number up from zero, formatted, honouring reduced-motion.
function animateUp(el) {
  const to  = Number(el.dataset.to) || 0;
  const pre = el.dataset.pre || '';
  const suf = el.dataset.suf || '';
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = pre + fmt(to) + suf; return;
  }
  const dur = 900, start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / dur), e = 1 - Math.pow(1 - p, 3);
    el.textContent = pre + fmt(Math.round(to * e)) + suf;
    if (p < 1) requestAnimationFrame(tick); else el.textContent = pre + fmt(to) + suf;
  }
  requestAnimationFrame(tick);
}

// Printable district repayment sheet for the RDC to mobilise collections.
function printReport() {
  const v = lastView;
  if (!v || !v.rows.length) { showToast('Nothing to print for this view', 'error'); return; }

  const uniq = [...new Set(v.rows.map(L => L.m.district))];
  const distName = uniq.length === 1
    ? ((DISTRICTS.find(d => d.code === uniq[0]) || {}).name || 'District')
    : 'All 12 Districts';
  const stat = document.getElementById('filterStatus').value;
  const statusNote = stat ? ` &middot; Showing ${stat} loans only` : '';
  const emblem = `${location.origin}/images/coat-of-arms.png`;
  const issued = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  // Chase the worst first: overdue, then largest outstanding.
  const sorted = [...v.rows].sort((a, b) => {
    const ao = a.status === 'Overdue' ? 0 : 1, bo = b.status === 'Overdue' ? 0 : 1;
    return ao - bo || b.outstanding - a.outstanding;
  });
  const rowsHtml = sorted.map((L, i) => {
    const trc = L.status === 'Overdue' ? 'od' : L.status === 'Cleared' ? 'cl' : '';
    const stc = L.status === 'Overdue' ? 'over' : L.status === 'Cleared' ? 'clr' : 'rep';
    return `<tr class="${trc}">
      <td class="c">${i + 1}</td>
      <td><b>${L.m.name}</b><div class="sid">${L.m.id}</div></td>
      <td>${L.m.depot}</td>
      <td class="n">${fmt(L.totalDue)}</td>
      <td class="n g">${fmt(L.repaid)}</td>
      <td class="n r">${fmt(L.outstanding)}</td>
      <td class="c">${L.due ? formatDate(L.due) : '-'}</td>
      <td class="c"><span class="st ${stc}">${L.status}</span></td>
    </tr>`;
  }).join('');
  const totalRow = `<tr class="tot"><td colspan="3" style="text-align:right">TOTAL</td><td class="n">${fmt(v.sumDue)}</td><td class="n g">${fmt(v.sumRep)}</td><td class="n r">${fmt(v.sumOut)}</td><td colspan="2"></td></tr>`;

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Repayment Status - ${distName}</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    @page{size:A4;margin:0}
    body{font-family:'Nunito',sans-serif;color:#1c3326;background:#e9efeb;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sheet{width:210mm;min-height:297mm;margin:0 auto;background:#fff;display:flex;flex-direction:column}
    .hd{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);color:#fff;padding:13mm 16mm 11mm;display:flex;align-items:center;gap:15px;position:relative;overflow:hidden}
    .hd::after{content:"";position:absolute;right:-60px;top:-90px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05)}
    .hd .emblem{width:56px;height:56px;object-fit:contain;position:relative;flex-shrink:0}
    .hd .ht{position:relative;flex:1}
    .hd .prog{font-family:'Varela Round',sans-serif;font-size:20px;line-height:1.14}
    .hd .off{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.66);margin-top:7px}
    .titlebar{display:flex;justify-content:space-between;align-items:center;padding:8mm 16mm 0}
    .titlebar .t{font-family:'Varela Round',sans-serif;font-size:15px;color:#0a7a3a;text-transform:uppercase;letter-spacing:.13em}
    .titlebar .dist{font-family:'Varela Round',sans-serif;font-size:13px;color:#142a1d;background:#eaf7f0;border:1.5px solid #b3e6c8;border-radius:8px;padding:6px 15px}
    .meta{padding:3mm 16mm 0;font-size:10.5px;font-weight:700;color:#7a8e83}
    .body{padding:6mm 16mm 0;flex:1}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4mm}
    .cd{border:1.5px solid #e3ece7;border-radius:11px;padding:10px 13px}
    .cd .l{font-size:8.5px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#7a8e83}
    .cd .v{font-family:'Varela Round',sans-serif;font-size:15px;color:#142a1d;margin-top:4px}
    .cd .v.g{color:#0a7a3a}
    .callout{background:#fdecec;border:1.5px solid #f5b7b1;border-radius:12px;padding:13px 18px;margin-bottom:5mm;display:flex;justify-content:space-between;align-items:center}
    .callout .l{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:#a02c2c}
    .callout .l span{display:block;font-size:10px;font-weight:700;text-transform:none;letter-spacing:0;color:#c0392b;margin-top:3px}
    .callout .v{font-family:'Varela Round',sans-serif;font-size:23px;color:#c0392b}
    table{width:100%;border-collapse:collapse;font-size:10.5px}
    thead th{background:#f4f9f6;text-align:left;font-size:8.5px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;color:#5b6b62;padding:8px;border-bottom:1.5px solid #d8ece1}
    tbody td{padding:8px;border-bottom:1px solid #eef2f0;vertical-align:top}
    td.n{text-align:right;font-variant-numeric:tabular-nums;font-weight:800}
    td.c{text-align:center}
    td.n.g{color:#0a7a3a}td.n.r{color:#c0392b}
    .sid{font-size:8.5px;color:#0a7a3a;font-weight:800;margin-top:1px}
    tr.od td{background:#fdf3f3}
    tr.cl td{color:#8aa297}
    .st{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:100px;border:1px solid;white-space:nowrap}
    .st.over{background:#fdecec;color:#c0392b;border-color:#f5b7b1}
    .st.clr{background:#eaf7f0;color:#007a33;border-color:#b3e6c8}
    .st.rep{background:#fff5e6;color:#b06a00;border-color:#ffd699}
    tr.tot td{font-weight:900;border-top:2px solid #0a7a3a;background:#f4f9f6;color:#142a1d}
    .sign{display:flex;gap:42px;padding:11mm 16mm 0}
    .sig{flex:1}
    .sig .line{border-bottom:1.4px solid #b9c7bf;height:32px}
    .sig .lbl{font-size:9.5px;font-weight:800;color:#7a8e83;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
    .ft{margin-top:auto;padding:7mm 16mm 9mm;border-top:1.5px solid #eef2f0;display:flex;justify-content:space-between;align-items:center;font-size:9.5px;color:#9aa8a0;font-weight:700}
    .ft .bar{font-family:'Varela Round',sans-serif;color:#0a7a3a;font-size:12px}
    @media print{body{background:#fff}.sheet{margin:0}}
  </style></head><body>
  <div class="sheet">
    <div class="hd">
      <img class="emblem" src="${emblem}" alt="" onerror="this.style.display='none'">
      <div class="ht"><div class="prog">Busoga Ghetto Presidential Empowerment Fund</div><div class="off">Office of the President, State House Uganda</div></div>
    </div>
    <div class="titlebar"><div class="t">Loan Repayment Status</div><div class="dist">${distName}</div></div>
    <div class="meta">Generated ${issued}${statusNote}</div>
    <div class="body">
      <div class="cards">
        <div class="cd"><div class="l">Disbursed Loans</div><div class="v">${fmt(v.rows.length)}</div></div>
        <div class="cd"><div class="l">Total Due (UGX)</div><div class="v">${fmt(v.sumDue)}</div></div>
        <div class="cd"><div class="l">Repaid (UGX)</div><div class="v g">${fmt(v.sumRep)}</div></div>
        <div class="cd"><div class="l">Collected</div><div class="v">${v.pct}%</div></div>
      </div>
      <div class="callout">
        <div class="l">Outstanding to mobilise<span>${fmt(v.overdue)} loan${v.overdue === 1 ? '' : 's'} overdue (past the 12-month due date)</span></div>
        <div class="v">UGX ${fmt(v.sumOut)}</div>
      </div>
      <table>
        <thead><tr><th>#</th><th>Beneficiary</th><th>Depot</th><th style="text-align:right">Total Due</th><th style="text-align:right">Repaid</th><th style="text-align:right">Outstanding</th><th style="text-align:center">Due Date</th><th style="text-align:center">Status</th></tr></thead>
        <tbody>${rowsHtml}${totalRow}</tbody>
      </table>
    </div>
    <div class="sign">
      <div class="sig"><div class="line"></div><div class="lbl">Issued by (Coordinator)</div></div>
      <div class="sig"><div class="line"></div><div class="lbl">Received by (RDC) &middot; Date</div></div>
    </div>
    <div class="ft"><span class="bar">Together We Can</span><span>Busoga Ghetto Structure &middot; Presidential Empowerment Fund (Busoga Pilot)</span></div>
  </div>
  ${'<scr' + 'ipt>window.onload=function(){setTimeout(function(){window.print()},420)}</scr' + 'ipt>'}
  </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}

loadRepayments();
</script>
</body>
</html>

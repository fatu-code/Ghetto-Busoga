<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reports - BGS</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/favicon-32.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<meta name="theme-color" content="#0a7a3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Busoga Ghetto">
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://backend-ghetto-busoga-production.up.railway.app" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* Fund overview hero */
.rep-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.rep-hero::after{content:"";position:absolute;right:-40px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
.rep-hero-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;position:relative}
.rep-hero-l{font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.6)}
.rep-hero-v{font-family:var(--font);font-size:2rem;line-height:1;margin-top:7px}
.rep-hero-fig{display:flex;gap:22px;text-align:right}
.rep-hero-fig span{display:block;font-family:var(--font2);font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-bottom:3px}
.rep-hero-fig b{font-family:var(--font);font-size:1.05rem;font-weight:400}
.rep-hero-bar{height:9px;background:rgba(255,255,255,.16);border-radius:100px;margin-top:16px;overflow:hidden}
.rep-hero-fill{height:100%;background:linear-gradient(90deg,#b3e6c8,#5fd99a);border-radius:100px;transition:width 1s var(--ease)}
.rep-hero::before{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);pointer-events:none;animation:repShimmer 6.5s ease-in-out infinite}
@keyframes repShimmer{0%{left:-60%}60%{left:135%}100%{left:135%}}
@media (prefers-reduced-motion:reduce){.rep-hero::before{animation:none}}

/* Stat tiles with icon + accent bar */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:20px}
.sum-card{position:relative;overflow:hidden;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px 15px 14px 18px;display:flex;align-items:center;gap:12px;transition:all .16s}
.sum-card:hover{border-color:var(--green-mid);box-shadow:0 10px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.sum-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.sum-card.blue::before{background:#3b82f6}.sum-card.red::before{background:#c0392b}.sum-card.amb::before{background:var(--amber)}
.sum-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--green-pale);border:1.5px solid var(--green-mid)}
.sum-ic svg{width:17px;height:17px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sum-card.blue .sum-ic{background:var(--blue-pale);border-color:var(--blue-mid)}.sum-card.blue .sum-ic svg{stroke:#3b82f6}
.sum-card.red .sum-ic{background:#fdecec;border-color:#f5b7b1}.sum-card.red .sum-ic svg{stroke:#c0392b}
.sum-card.amb .sum-ic{background:var(--amber-pale);border-color:var(--amber-mid)}.sum-card.amb .sum-ic svg{stroke:var(--amber)}
.sum-l{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.sum-v{font-family:var(--font);font-size:1.2rem;color:var(--text);margin-top:3px;line-height:1}
.sum-v.green{color:var(--green)} .sum-v.red{color:#c0392b} .sum-v.amber{color:#b06a00}

/* Section card + header with icon */
.rep-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}
.rep-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 18px;border-bottom:1.5px solid var(--border)}
.rep-head-l{display:flex;align-items:center;gap:11px}
.rep-head-ic{width:34px;height:34px;border-radius:10px;background:var(--green-pale);border:1.5px solid var(--green-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rep-head-ic svg{width:16px;height:16px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.rep-title{font-family:var(--font2);font-weight:900;color:var(--text);font-size:.92rem}
.rep-sub{font-family:var(--font2);font-size:.66rem;font-weight:700;color:var(--muted);margin-top:1px}

/* Share-of-fund mini bar under the district name */
.share{height:5px;background:var(--bg);border-radius:100px;overflow:hidden;margin-top:7px;max-width:170px}
.share-fill{height:100%;border-radius:100px;transition:width .9s var(--ease)}

/* ── VISUAL OVERVIEW (charts) ───────────────────────────────────── */
.viz-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.viz-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
.viz-h{font-family:var(--font2);font-weight:900;font-size:.78rem;color:var(--text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.viz-h svg{width:16px;height:16px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
/* Visual grid - all charts on one page */
.viz-full{grid-column:1 / -1}
/* Trend line */
.trend svg{width:100%;height:auto;display:block;overflow:visible}
.trend-area{fill:url(#tg)}
.trend-line{fill:none;stroke:var(--green);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;transition:stroke-dashoffset 1.1s var(--ease)}
.trend-dot{fill:var(--green);stroke:#fff;stroke-width:1.4}
.trend-x{display:flex;justify-content:space-between;margin-top:9px}
.trend-x span{font-family:var(--font2);font-size:.6rem;font-weight:800;color:var(--muted);letter-spacing:.03em}
/* District heatmap */
.hmap{display:grid;grid-template-columns:repeat(auto-fit,minmax(50px,1fr));gap:6px}
.hcell{border-radius:9px;padding:11px 6px;text-align:center;border:1px solid rgba(0,156,65,.14);transition:transform .15s var(--ease)}
.hcell:hover{transform:translateY(-2px)}
.hc-code{font-family:var(--font2);font-size:.6rem;font-weight:800;letter-spacing:.03em}
.hc-n{font-family:var(--font);font-size:1.05rem;margin-top:2px;line-height:1}
/* Donut */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut-box{position:relative;width:132px;height:132px;flex-shrink:0}
.donut{width:132px;height:132px;transform:rotate(-90deg)}
.donut .d-bg{fill:none;stroke:var(--bg);stroke-width:14}
.donut .d-fg{fill:none;stroke:var(--green);stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1.1s var(--ease)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:var(--font);font-size:1.7rem;color:var(--text);line-height:1}
.donut-sub{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:3px}
.donut-leg{display:grid;gap:11px;flex:1;min-width:140px}
.leg-row{display:flex;align-items:center;gap:9px}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.leg-row .t{font-family:var(--font2);font-size:.72rem;font-weight:700;color:var(--muted)}
.leg-row .v{font-family:var(--font);font-size:.88rem;color:var(--text);margin-left:auto}
/* Funnel */
.funnel{display:grid;gap:13px}
.fn-bar{height:36px;margin:0 auto;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font);font-size:1rem;transition:width 1s var(--ease);min-width:40px}
.fn-lbl{font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:5px;text-align:center}
.fn-lbl b{color:var(--green-dark)}
/* Bar chart */
.bars{display:grid;gap:11px}
.bar-row{display:grid;grid-template-columns:118px 1fr 112px;align-items:center;gap:12px}
.bar-name{font-family:var(--font2);font-size:.76rem;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{height:14px;background:var(--bg);border:1px solid var(--border);border-radius:100px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green));border-radius:100px;transition:width .9s var(--ease)}
.bar-val{font-family:var(--font);font-size:.8rem;color:var(--text);text-align:right;font-variant-numeric:tabular-nums}
@media (max-width:760px){.viz-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:92px 1fr 88px;gap:9px}}
.money{font-family:var(--font);font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
/* Clean financial-report table */
.rep-card table{width:100%;border-collapse:collapse}
.rep-card th,.rep-card td{padding:12px 18px;text-align:left;font-size:.82rem;color:var(--text)}
.rep-card th.num,.rep-card td.num,.rep-card td.money{text-align:right;font-variant-numeric:tabular-nums}
.rep-card thead th{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:#f7faf8;border-bottom:1.5px solid var(--border)}
.rep-card tbody tr + tr td{border-top:1px solid #eef2f0}
.rep-card tbody tr:hover td{background:#fafdfb}
/* Totals: a clear rule line above, bold figures, no fill (so no clipped corners) */
.rep-card tfoot td{font-family:var(--font2);font-weight:900;color:#142a1d;border-top:2.5px solid var(--green);padding-top:14px;padding-bottom:14px}
.rep-card tfoot td:first-child{color:#0a7a3a;text-transform:uppercase;letter-spacing:.05em;font-size:.74rem}

/* ── MOBILE: turn each table row into a clean card (no sideways scroll) ── */
@media (max-width:600px){
  .sum-grid{gap:10px}
  .sum-v{font-size:1.2rem}
  .share{display:none}
  /* Flatten the section card; render each row as its own clean card (no big outline) */
  .rep-card{background:transparent;border:none;box-shadow:none;border-radius:0;overflow:visible;margin-bottom:8px}
  .rep-head{padding:2px 2px 10px;border-bottom:none}
  .rep-card .table-wrap{overflow:visible}
  .rep-card table,
  .rep-card tbody,
  .rep-card tfoot,
  .rep-card tr{display:block;width:100%}
  .rep-card table{min-width:0}
  .rep-card thead{display:none}
  .rep-card tbody tr{background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:10px}
  .rep-card td{display:flex;width:100%;justify-content:space-between;align-items:center;gap:12px;padding:7px 0!important;border:none!important;text-align:right}
  .rep-card td::before{content:attr(data-label);font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);text-align:left;flex-shrink:0}
  .rep-card td:first-child{display:block;text-align:left;font-size:.98rem;font-weight:800;padding:0 0 9px!important;margin-bottom:7px;border-bottom:1px solid var(--border)!important}
  .rep-card td:first-child::before{display:none}
  /* TOTAL row as a highlighted card */
  .rep-card tfoot tr{background:var(--green-pale);border:1.5px solid var(--green-mid);border-radius:13px;padding:13px 15px}
  .rep-card tfoot td:first-child{font-size:.82rem;border-bottom-color:var(--green-mid)!important}
}
/* Print letterhead (screen-hidden) */
.print-head{display:none}
@media print{
  .sidebar,.topbar,.filter-bar,.no-print,.rep-hero,.viz-grid,.viz-card{display:none !important}
  .sum-card::before,.share{display:none}
  .main-area,.content{margin:0;padding:0}
  body{background:#fff}
  .print-head{display:block;margin-bottom:14px}
  .rep-card,.sum-card{box-shadow:none;break-inside:avoid}
  @page{size:A4 landscape;margin:12mm}
}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Reports</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
      <div class="topbar-right no-print">
        <button class="btn" onclick="downloadCSV()">
          <svg viewBox="0 0 16 16"><path d="M8 1v9M5 7l3 3 3-3"/><path d="M2 12v2h12v-2"/></svg>
          <span class="mob-hide">CSV</span>
        </button>
        <button class="btn btn-green" onclick="printReport()">
          <svg viewBox="0 0 16 16"><path d="M4 6V2h8v4"/><rect x="2" y="6" width="12" height="6" rx="1"/><path d="M4 12h8v3H4z"/></svg>
          <span class="mob-hide">Print / PDF</span>
        </button>
      </div>
    </div>

    <div class="content">
      <div class="filter-bar no-print">
        <div style="flex:1;font-family:var(--font2);font-size:.78rem;font-weight:600;color:var(--muted);min-width:200px">
          Fund summary across all districts and depots. Use Print / PDF or CSV to export for records and audit.
        </div>
        <select class="filter-select" id="filterDistrict" onchange="render()"><option value="">All districts (depot table)</option></select>
      </div>

      <div id="reportBody">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.guard(['admin', 'rdc'], 'depots.html');
buildSidebar('reports');

DISTRICTS.forEach(d => {
  const o = document.createElement('option');
  o.value = d.code; o.textContent = d.name;
  document.getElementById('filterDistrict').appendChild(o);
});

let members = [];
let districtRows = [];
let repIntro = false;
let lastReport = null;
const COLORS = ['#009c41','#0ea5e9','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#ef4444','#6366f1','#f97316','#06b6d4','#84cc16','#d946ef'];

function isOverdue(m, outstanding) {
  if (!(outstanding > 0) || !m.disbursement_date) return false;
  const dd = new Date(m.disbursement_date);
  if (isNaN(dd)) return false;
  dd.setMonth(dd.getMonth() + 12);
  return new Date() > dd;
}
function agg(list) {
  const o = { count: 0, disbursedCount: 0, disbursed: 0, repaid: 0, outstanding: 0, overdue: 0 };
  list.forEach(m => {
    o.count++;
    const amt = Number(m.amount) || 0;
    if (amt > 0) {
      const due = Math.round(amt * 1.06);
      const rep = Number(m.repaid) || 0;
      const out = Math.max(0, due - rep);
      o.disbursedCount++;
      o.disbursed   += amt;
      o.repaid      += rep;
      o.outstanding += out;
      if (isOverdue(m, out)) o.overdue++;
    }
  });
  return o;
}

async function load() {
  try {
    members = await loadAllMembers();
    render();
  } catch (e) {
    showToast('Failed to load report', 'error');
  }
}

function moneyRow(label, a, bar) {
  const barHtml = bar ? `<div class="share"><div class="share-fill" style="width:${bar.pct}%;background:${bar.color}"></div></div>` : '';
  return `<tr>
    <td style="font-weight:800">${label}${barHtml}</td>
    <td class="num" data-label="Members">${fmt(a.count)}</td>
    <td class="num" data-label="Disbursed">${fmt(a.disbursedCount)}</td>
    <td class="money" data-label="Amount (UGX)">${fmt(a.disbursed)}</td>
    <td class="money" data-label="Repaid (UGX)" style="color:var(--green)">${fmt(a.repaid)}</td>
    <td class="money" data-label="Outstanding (UGX)" style="color:${a.outstanding > 0 ? '#c0392b' : 'var(--green)'}">${fmt(a.outstanding)}</td>
    <td class="num" data-label="Overdue" style="color:${a.overdue ? '#c0392b' : 'var(--muted)'}">${fmt(a.overdue)}</td>
  </tr>`;
}

function render() {
  const fund = agg(members);

  // by district
  districtRows = DISTRICTS.map(d => ({ d, a: agg(members.filter(m => m.district === d.code)) }))
    .filter(r => r.a.count > 0)
    .sort((x, y) => y.a.disbursed - x.a.disbursed || y.a.count - x.a.count);

  // by depot (optionally narrowed to a district)
  const dsel = document.getElementById('filterDistrict').value;
  const depotKeys = {};
  members.forEach(m => {
    if (dsel && m.district !== dsel) return;
    const k = m.district + '||' + m.depot;
    (depotKeys[k] = depotKeys[k] || []).push(m);
  });
  const depotRows = Object.keys(depotKeys).map(k => {
    const [code, depot] = k.split('||');
    const dn = (DISTRICTS.find(x => x.code === code) || {}).name || code;
    return { depot, dn, a: agg(depotKeys[k]) };
  }).sort((x, y) => y.a.disbursed - x.a.disbursed || y.a.count - x.a.count);

  const issued = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const totalDue = Math.round(fund.disbursed * 1.06);
  const cpct = totalDue ? Math.round((fund.repaid / totalDue) * 100) : 0;
  const cleared = members.filter(m => Number(m.amount) > 0 && (Number(m.repaid) || 0) >= Math.round(Number(m.amount) * 1.06)).length;
  lastReport = { fund, districtRows: districtRows.slice(), depotRows, dsel, issued, cpct, cleared };

  // Visuals: donut (collection), funnel (pipeline), bar chart (by district)
  const DC = 2 * Math.PI * 52;
  const dashOff = DC * (1 - Math.min(100, cpct) / 100);
  const disbPct = fund.count ? Math.round((fund.disbursedCount / fund.count) * 100) : 0;
  const clearPct = fund.count ? Math.round((cleared / fund.count) * 100) : 0;
  const maxDisb = Math.max(1, ...districtRows.map(r => r.a.disbursed), 1);

  // Trend: new registrations per month (last 6 months)
  const _now = new Date();
  const tMonths = [];
  for (let k = 5; k >= 0; k--) {
    const d = new Date(_now.getFullYear(), _now.getMonth() - k, 1);
    tMonths.push({ y: d.getFullYear(), m: d.getMonth(), label: d.toLocaleDateString('en-UG', { month: 'short' }), count: 0 });
  }
  members.forEach(mem => {
    const c = new Date(mem.created_at);
    if (isNaN(c)) return;
    const idx = tMonths.findIndex(x => x.y === c.getFullYear() && x.m === c.getMonth());
    if (idx >= 0) tMonths[idx].count++;
  });
  const tMax = Math.max(1, ...tMonths.map(x => x.count));
  const TW = 300, TH = 86, TP = 8;
  const tPts = tMonths.map((x, i) => ({
    px: TP + (i / Math.max(1, tMonths.length - 1)) * (TW - 2 * TP),
    py: TH - TP - (x.count / tMax) * (TH - 2 * TP)
  }));
  const tLine = tPts.map(p => `${p.px.toFixed(1)},${p.py.toFixed(1)}`).join(' ');
  const tArea = `${TP},${TH - TP} ${tLine} ${TW - TP},${TH - TP}`;

  // Heatmap: member concentration per district
  const distCount = {};
  members.forEach(m => { distCount[m.district] = (distCount[m.district] || 0) + 1; });
  const hMax = Math.max(1, ...Object.values(distCount), 1);
  lastReport.tMonths = tMonths; lastReport.distCount = distCount; lastReport.hMax = hMax;

  const viz = `
    <div class="viz-grid">
      <div class="viz-card viz-full">
        <div class="viz-h"><svg viewBox="0 0 16 16"><path d="M2 2v12h12M5 14V7M8.5 14V4M12 14V9"/></svg> Disbursed by district</div>
        <div class="bars">
          ${districtRows.map(r => `<div class="bar-row"><div class="bar-name">${r.d.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((r.a.disbursed / maxDisb) * 100)}%"></div></div><div class="bar-val">${fmt(r.a.disbursed)}</div></div>`).join('') || '<div style="color:var(--muted);font-size:.8rem">No data yet</div>'}
        </div>
      </div>

      <div class="viz-card">
        <div class="viz-h"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><path d="M8 2v6l4 2.3"/></svg> Collection</div>
        <div class="donut-wrap">
          <div class="donut-box">
            <svg class="donut" viewBox="0 0 120 120"><circle class="d-bg" cx="60" cy="60" r="52"></circle><circle class="d-fg" cx="60" cy="60" r="52" data-off="${dashOff}" style="stroke-dasharray:${DC};stroke-dashoffset:${DC}"></circle></svg>

// Count a number up from zero, formatted, honouring reduced-motion.
function animateUp(el) {
  const to  = Number(el.dataset.to) || 0;
  const pre = el.dataset.pre || '';
  const suf = el.dataset.suf || '';
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    el.textContent = pre + fmt(to) + suf; return;
  }
  const dur = 900, start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / dur), e = 1 - Math.pow(1 - p, 3);
    el.textContent = pre + fmt(Math.round(to * e)) + suf;
    if (p < 1) requestAnimationFrame(tick); else el.textContent = pre + fmt(to) + suf;
  }
  requestAnimationFrame(tick);
}

function downloadCSV() {
  const rows = [['District', 'Members', 'Disbursed (count)', 'Amount UGX', 'Repaid UGX', 'Outstanding UGX', 'Overdue']];
  districtRows.forEach(r => rows.push([r.d.name, r.a.count, r.a.disbursedCount, r.a.disbursed, r.a.repaid, r.a.outstanding, r.a.overdue]));
  const fund = agg(members);
  rows.push(['TOTAL', fund.count, fund.disbursedCount, fund.disbursed, fund.repaid, fund.outstanding, fund.overdue]);
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bgs-fund-report.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

load();

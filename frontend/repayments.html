<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Repayments — BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* Collection progress hero */
.rp-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.rp-hero::after{content:"";position:absolute;right:-40px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
.rp-hero-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;position:relative}
.rp-hero-l{font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.6)}
.rp-hero-v{font-family:var(--font);font-size:2.1rem;line-height:1;margin-top:7px}
.rp-hero-v span{font-family:var(--font2);font-size:.85rem;font-weight:700;color:rgba(255,255,255,.6)}
.rp-hero-fig{display:flex;gap:24px;text-align:right}
.rp-hero-fig span{display:block;font-family:var(--font2);font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);margin-bottom:3px}
.rp-hero-fig b{font-family:var(--font);font-size:1.05rem;font-weight:400}
.rp-hero-bar{height:9px;background:rgba(255,255,255,.16);border-radius:100px;margin-top:16px;overflow:hidden;position:relative}
.rp-hero-fill{height:100%;background:linear-gradient(90deg,#b3e6c8,#5fd99a);border-radius:100px;transition:width 1s var(--ease)}

/* Stat tiles with icon + accent bar */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:12px;margin-bottom:20px}
.sum-card{position:relative;overflow:hidden;background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:15px 16px 15px 19px;display:flex;align-items:center;gap:13px;transition:all .16s}
.sum-card:hover{border-color:var(--green-mid);box-shadow:0 10px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.sum-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.sum-card.due::before{background:#3b82f6}.sum-card.out::before{background:#c0392b}.sum-card.ovd::before{background:var(--amber)}
.sum-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--green-pale);border:1.5px solid var(--green-mid)}
.sum-ic svg{width:18px;height:18px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sum-card.due .sum-ic{background:var(--blue-pale);border-color:var(--blue-mid)}.sum-card.due .sum-ic svg{stroke:#3b82f6}
.sum-card.out .sum-ic{background:#fdecec;border-color:#f5b7b1}.sum-card.out .sum-ic svg{stroke:#c0392b}
.sum-card.ovd .sum-ic{background:var(--amber-pale);border-color:var(--amber-mid)}.sum-card.ovd .sum-ic svg{stroke:var(--amber)}
.sum-l{font-family:var(--font2);font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sum-v{font-family:var(--font);font-size:1.25rem;color:var(--text);margin-top:4px;line-height:1}
.sum-v.green{color:var(--green)}.sum-v.red{color:#c0392b}.sum-v.amber{color:#b06a00}

.lp{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:100px;display:inline-block}
.lp.rep{background:#fff5e6;color:#b06a00;border:1px solid #ffd699}
.lp.over{background:#fdecec;color:#c0392b;border:1px solid #f5b7b1}
.lp.clr{background:#eaf7f0;color:#007a33;border:1px solid #b3e6c8}
.r-money{font-family:var(--font);font-weight:800}

/* District section as a card with coloured header + collection bar */
.dsec{margin-bottom:16px;background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.dhead{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 16px}
.dhead-l{display:flex;align-items:center;gap:12px;min-width:0}
.dhead-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.dhead-ic svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.dhead .dn{font-family:var(--font2);font-weight:900;color:var(--text);font-size:1rem;line-height:1.1}
.dhead .dsub{font-family:var(--font2);font-size:.68rem;font-weight:700;color:var(--muted);margin-top:2px}
.dchips{display:flex;gap:7px;flex-wrap:wrap}
.dchip{font-family:var(--font2);font-size:.64rem;font-weight:800;padding:5px 10px;border-radius:100px;background:var(--bg);color:var(--text);border:1px solid var(--border);white-space:nowrap}
.dchip.out{background:#fdecec;color:#c0392b;border-color:#f5b7b1}
.dchip.ovd{background:var(--amber-pale);color:#b06a00;border-color:var(--amber-mid)}
.dprog{height:5px;background:var(--bg)}
.dprog-fill{height:100%;transition:width .9s var(--ease)}

/* ── MOBILE: each loan row becomes a clean stacked block (no sideways scroll) ── */
@media (max-width:600px){
  .sum-grid{gap:10px}
  .sum-v{font-size:1.15rem}
  .rp-hero-v{font-size:1.7rem}
  .rp-hero-fig{gap:16px}
  .dhead{padding:13px 14px}
  .dsec .table-wrap{overflow:visible}
  /* The table element itself must become block flow, or rows collapse to content width */
  .dsec table,.dsec tbody,.dsec tr{display:block;width:100%}
  .dsec table{min-width:0}
  .dsec thead{display:none}
  .dsec tbody tr{padding:13px 16px;border-top:1px solid var(--border)}
  .dsec tbody tr:hover{background:transparent}
  .dsec td{display:flex;width:100%;justify-content:space-between;align-items:center;gap:12px;padding:7px 0;border:none;text-align:right}
  .dsec td::before{content:attr(data-label);font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);text-align:left;flex-shrink:0}
  .dsec td:first-child{display:block;text-align:left;padding:0 0 10px;margin-bottom:8px;border-bottom:1px solid var(--border)}
  .dsec td:first-child::before{display:none}
  .dsec td:last-child{padding-bottom:0}
}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Repayments</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="filter-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search by name or serial..." oninput="render()">
        </div>
        <select class="filter-select" id="filterDistrict" onchange="render()"><option value="">All districts</option></select>
        <select class="filter-select" id="filterStatus" onchange="render()">
          <option value="">All statuses</option>
          <option value="Overdue">Overdue</option>
          <option value="Repaying">Repaying</option>
          <option value="Cleared">Cleared</option>
        </select>
      </div>

      <div id="repayContainer">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.guard(['admin', 'rdc'], 'depots.html');
buildSidebar('repayments');

DISTRICTS.forEach(d => {
  const o = document.createElement('option');
  o.value = d.code; o.textContent = d.name;
  document.getElementById('filterDistrict').appendChild(o);
});

let loans = [];
let rpIntro = false;
// A distinct accent colour per district, to match the rest of the app.
const COLORS = ['#009c41','#0ea5e9','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#ef4444','#6366f1','#f97316','#06b6d4','#84cc16','#d946ef'];

function dueDate(d) {
  if (!d) return null;
  const x = new Date(d);
  if (isNaN(x)) return null;
  x.setMonth(x.getMonth() + 12);
  return x;
}

async function loadRepayments() {
  try {
    const data = await apiFetch('/api/members?limit=100000');
    const members = (data.members || []).filter(m => Number(m.amount) > 0); // only disbursed
    loans = members.map(m => {
      const principal   = Number(m.amount) || 0;
      const totalDue     = Math.round(principal * 1.06);
      const repaid      = Number(m.repaid) || 0;
      const outstanding = Math.max(0, totalDue - repaid);
      const due         = dueDate(m.disbursement_date);
      const cleared     = outstanding <= 0;
      const overdue     = !cleared && due && new Date() > due;
      const status      = cleared ? 'Cleared' : overdue ? 'Overdue' : 'Repaying';
      return { m, principal, totalDue, repaid, outstanding, due, status };
    });
    render();
  } catch (e) {
    showToast('Failed to load repayments', 'error');
  }
}

function render() {
  const q      = document.getElementById('searchInput').value.trim().toLowerCase();
  const dist   = document.getElementById('filterDistrict').value;
  const stat   = document.getElementById('filterStatus').value;

  const rows = loans.filter(L =>
    (!dist || L.m.district === dist) &&
    (!stat || L.status === stat) &&
    (!q || L.m.name.toLowerCase().includes(q) || L.m.id.toLowerCase().includes(q))
  );

  // Summary over the filtered set
  const sumDue  = rows.reduce((s, L) => s + L.totalDue, 0);
  const sumRep  = rows.reduce((s, L) => s + L.repaid, 0);
  const sumOut  = rows.reduce((s, L) => s + L.outstanding, 0);
  const overdue = rows.filter(L => L.status === 'Overdue').length;

  document.getElementById('countLabel').textContent =
    `${fmt(rows.length)} disbursed loan${rows.length === 1 ? '' : 's'}`;

  const pct = sumDue ? Math.round((sumRep / sumDue) * 100) : 0;
  const summary = `
    <div class="rp-hero">
      <div class="rp-hero-top">
        <div>
          <div class="rp-hero-l">Loan collection</div>
          <div class="rp-hero-v">${pct}% <span>collected</span></div>
        </div>
        <div class="rp-hero-fig">
          <div><span>Repaid</span><b style="color:#b3e6c8">UGX ${fmt(sumRep)}</b></div>
          <div><span>Outstanding</span><b>UGX ${fmt(sumOut)}</b></div>
        </div>
      </div>
      <div class="rp-hero-bar"><div class="rp-hero-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sum-grid">
      <div class="sum-card due"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M8 1.5v13M4.5 5h5a2.2 2.2 0 010 4.4H5.5"/></svg></div><div><div class="sum-l">Total Due</div><div class="sum-v">UGX ${fmt(sumDue)}</div></div></div>
      <div class="sum-card"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg></div><div><div class="sum-l">Repaid</div><div class="sum-v green">UGX ${fmt(sumRep)}</div></div></div>
      <div class="sum-card out"><div class="sum-ic"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg></div><div><div class="sum-l">Outstanding</div><div class="sum-v red">UGX ${fmt(sumOut)}</div></div></div>
      <div class="sum-card ovd"><div class="sum-ic"><svg viewBox="0 0 16 16"><path d="M8 1.7l6.3 11.1a.6.6 0 01-.5.9H2.2a.6.6 0 01-.5-.9z"/><path d="M8 6.3v3.1M8 11.4v.2"/></svg></div><div><div class="sum-l">Overdue</div><div class="sum-v amber">${fmt(overdue)}</div></div></div>
    </div>`;

  const rowHtml = L => `
    <tr class="clickable" onclick="location.href='member.html?id=${L.m.id}'">
      <td data-label="Beneficiary"><div style="font-weight:800">${L.m.name}</div><div style="font-family:var(--font);color:var(--green);font-size:.72rem">${L.m.id}</div></td>
      <td data-label="Depot" style="color:var(--muted)">${L.m.depot}</td>
      <td data-label="Total Due" class="r-money">UGX ${fmt(L.totalDue)}</td>
      <td data-label="Repaid" class="r-money" style="color:var(--green)">UGX ${fmt(L.repaid)}</td>
      <td data-label="Outstanding" class="r-money" style="color:${L.outstanding > 0 ? '#c0392b' : 'var(--green)'}">UGX ${fmt(L.outstanding)}</td>
      <td data-label="Due" style="color:var(--muted)">${L.due ? formatDate(L.due) : '-'}</td>
      <td data-label="Status"><span class="lp ${L.status === 'Overdue' ? 'over' : L.status === 'Cleared' ? 'clr' : 'rep'}">${L.status}</span></td>
    </tr>`;

  // Categorised by district: one section per district that has loans.
  const sections = DISTRICTS.map(d => {
    const dr = rows.filter(L => L.m.district === d.code);
    if (!dr.length) return '';
    const idx = DISTRICTS.findIndex(x => x.code === d.code);
    const col = COLORS[idx % COLORS.length];
    const due = dr.reduce((s, L) => s + L.totalDue, 0);
    const rep = dr.reduce((s, L) => s + L.repaid, 0);
    const out = dr.reduce((s, L) => s + L.outstanding, 0);
    const od  = dr.filter(L => L.status === 'Overdue').length;
    const dpct = due ? Math.round((rep / due) * 100) : 0;
    return `
      <div class="dsec">
        <div class="dhead">
          <div class="dhead-l">
            <div class="dhead-ic" style="background:${col}"><svg viewBox="0 0 16 16"><path d="M8 1.5l5 2v4c0 3.5-2.5 5.6-5 6.5-2.5-.9-5-3-5-6.5v-4z"/></svg></div>
            <div style="min-width:0"><div class="dn">${d.name}</div><div class="dsub">${dr.length} loan${dr.length === 1 ? '' : 's'} &middot; ${dpct}% collected</div></div>
          </div>
          <div class="dchips">
            <span class="dchip">Due UGX ${fmt(due)}</span>
            <span class="dchip out">Outstanding UGX ${fmt(out)}</span>
            ${od ? `<span class="dchip ovd">${od} overdue</span>` : ''}
          </div>
        </div>
        <div class="dprog"><div class="dprog-fill" style="width:${dpct}%;background:${col}"></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Beneficiary</th><th>Depot</th><th>Total Due</th><th>Repaid</th><th>Outstanding</th><th>Due</th><th>Status</th></tr></thead>
          <tbody>${dr.map(rowHtml).join('')}</tbody>
        </table></div>
      </div>`;
  }).join('');

  const body = rows.length ? sections
    : `<div class="card"><div class="empty-state">
        <div class="empty-title">No disbursed loans${dist || stat || q ? ' match this filter' : ' yet'}</div>
        <div class="empty-sub">Repayments appear here once beneficiaries have been disbursed.</div>
      </div></div>`;

  document.getElementById('repayContainer').innerHTML = summary + body;

  // Grow the progress bars once on first load (skipped on live filtering).
  if (!rpIntro) {
    rpIntro = true;
    requestAnimationFrame(() => {
      document.querySelectorAll('.rp-hero-fill, .dprog-fill').forEach(f => {
        const w = f.style.width; f.style.width = '0';
        requestAnimationFrame(() => { f.style.width = w; });
      });
    });
  }
}

loadRepayments();
</script>
</body>
</html>

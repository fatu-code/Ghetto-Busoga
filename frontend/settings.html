<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Settings — BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://backend-ghetto-busoga-production.up.railway.app" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
/* Profile hero */
.acct-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:22px 26px;margin-bottom:18px;color:#fff;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden}
.acct-hero::after{content:"";position:absolute;right:-50px;top:-70px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.05)}
.acct-hero::before{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);pointer-events:none;animation:acctShimmer 6.5s ease-in-out infinite}
@keyframes acctShimmer{0%{left:-60%}60%{left:135%}100%{left:135%}}
.acct-av{width:74px;height:74px;border-radius:20px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:1.8rem;color:#fff;flex-shrink:0;position:relative}
.acct-id{position:relative;min-width:0}
.acct-name{font-family:var(--font);font-size:1.5rem;color:#fff;line-height:1.1;letter-spacing:-.01em}
.acct-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
.acct-role{font-family:var(--font2);font-size:.72rem;font-weight:800;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:100px;padding:4px 12px}
.acct-user{font-family:var(--font2);font-size:.74rem;font-weight:700;color:rgba(255,255,255,.6)}

/* Cards with icon header + accent bar */
.set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:16px}
.set-card{position:relative;overflow:hidden;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);transition:all .16s;animation:setRise .5s var(--ease) backwards}
.set-card:nth-child(2){animation-delay:.08s}
.set-card:hover{border-color:var(--green-mid);box-shadow:0 12px 28px rgba(0,0,0,.08)}
.set-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.set-card.pw::before{background:#8b5cf6}
@keyframes setRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.set-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.set-ic{width:40px;height:40px;border-radius:12px;background:var(--green-pale);border:1.5px solid var(--green-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-ic svg{width:18px;height:18px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.set-card.pw .set-ic{background:#f3eefe;border-color:#d6c8fb}
.set-card.pw .set-ic svg{stroke:#6d28d9}
.set-card:nth-child(3){animation-delay:.16s}
.set-card.info::before{background:#0ea5e9}
.set-card.info .set-ic{background:var(--blue-pale);border-color:var(--blue-mid)}
.set-card.info .set-ic svg{stroke:#0ea5e9}
.acc-row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.acc-k{font-family:var(--font2);font-size:.7rem;font-weight:700;color:var(--muted)}
.acc-v{font-family:var(--font2);font-size:.8rem;font-weight:800;color:var(--text);text-align:right}
.acc-perms{margin-top:13px;display:grid;gap:9px}
.acc-p{display:flex;align-items:flex-start;gap:9px;font-family:var(--font2);font-size:.78rem;font-weight:600;color:var(--text);line-height:1.4}
.acc-p svg{width:14px;height:14px;fill:none;stroke:var(--green);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:2px}
.set-card h3{font-family:var(--font2);font-weight:900;color:var(--text);font-size:.95rem;line-height:1.1}
.set-card .sub{font-family:var(--font2);font-size:.7rem;font-weight:600;color:var(--muted);margin-top:2px;line-height:1.4}
@media (prefers-reduced-motion:reduce){.acct-hero::before{animation:none}.set-card{animation:none}}
@media (max-width:560px){.acct-hero{padding:18px 18px}.acct-av{width:60px;height:60px;font-size:1.4rem}.acct-name{font-size:1.25rem}}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Settings</div>
          <div class="topbar-sub">Your account</div>
        </div>
      </div>
    </div>

    <div class="content">

      <div class="acct-hero">
        <div class="acct-av" id="acctAv">HK</div>
        <div class="acct-id">
          <div class="acct-name" id="acctName">—</div>
          <div class="acct-meta">
            <span class="acct-role" id="acctRole">—</span>
            <span class="acct-user" id="acctUser"></span>
          </div>
        </div>
      </div>

      <div class="set-grid">

        <div class="set-card">
          <div class="set-head">
            <div class="set-ic"><svg viewBox="0 0 16 16"><circle cx="8" cy="5" r="2.5"/><path d="M3 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg></div>
            <div><h3>My Account</h3><div class="sub">Your name shows on the dashboard and on records you create.</div></div>
          </div>
          <div class="form-group" style="margin-bottom:12px"><label class="form-label">Full Name</label><input class="form-input" id="sName"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="sUsername" disabled></div>
            <div class="form-group"><label class="form-label">Role</label><input class="form-input" id="sRole" disabled></div>
          </div>
          <button class="btn btn-green" id="saveNameBtn" onclick="saveName()" style="margin-top:6px">
            <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Save Name
          </button>
        </div>

        <div class="set-card pw">
          <div class="set-head">
            <div class="set-ic"><svg viewBox="0 0 16 16"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5.5 7V5a2.5 2.5 0 015 0v2"/></svg></div>
            <div><h3>Change Password</h3><div class="sub">Use a password only you know. Minimum 6 characters.</div></div>
          </div>
          <div class="form-group" style="margin-bottom:12px"><label class="form-label">Current Password</label><input class="form-input" id="sCurrent" type="password" autocomplete="current-password"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">New Password</label><input class="form-input" id="sNew" type="password" autocomplete="new-password"></div>
            <div class="form-group"><label class="form-label">Confirm New</label><input class="form-input" id="sConfirm" type="password" autocomplete="new-password"></div>
          </div>
          <button class="btn btn-green" id="savePwBtn" onclick="savePassword()" style="margin-top:6px">
            <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Update Password
          </button>
        </div>

        <div class="set-card info">
          <div class="set-head">
            <div class="set-ic"><svg viewBox="0 0 16 16"><path d="M8 1.5l5 2v4c0 3.5-2.5 5.6-5 6.5-2.5-.9-5-3-5-6.5v-4z"/><path d="M5.8 8l1.6 1.6L10.4 6.6"/></svg></div>
            <div><h3>Your Access</h3><div class="sub">What this account can see and do.</div></div>
          </div>
          <div id="accRows"></div>
          <div class="acc-perms" id="accPerms"></div>
        </div>

      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.require();
buildSidebar('settings');
const me = Auth.get() || {};

function fillProfile() {
  const u = Auth.get() || {};
  document.getElementById('acctAv').textContent   = initials(u.name || 'HK');
  document.getElementById('acctName').textContent = u.name || 'Al-Hajj Faruk Kirunda';
  document.getElementById('acctRole').textContent = roleLabel(u);
  document.getElementById('acctUser').textContent = u.username ? '@' + u.username : '';
  document.getElementById('sName').value     = u.name || '';
  document.getElementById('sUsername').value = '@' + (u.username || '');
  document.getElementById('sRole').value     = roleLabel(u);
}
fillProfile();

// Read-only summary of this account's access.
function fillAccess() {
  const u = Auth.get() || {};
  const acc = accessOf(u);
  const dn = acc.district ? ((DISTRICTS.find(d => d.code === acc.district) || {}).name || acc.district) : '';
  const scope = acc.isAdmin ? 'All 12 districts of Busoga' : (dn ? dn + ' only' : 'One district');
  document.getElementById('accRows').innerHTML =
    `<div class="acc-row"><span class="acc-k">Role</span><span class="acc-v">${roleLabel(u)}</span></div>
     <div class="acc-row"><span class="acc-k">Scope</span><span class="acc-v">${scope}</span></div>`;
  let perms;
  if (acc.isAdmin) {
    perms = ['Register and disburse beneficiaries', 'Record repayments', 'Reports and exports', 'Manage users and depots', 'View the audit log'];
  } else if (acc.isRDC) {
    perms = [`Oversee ${dn}`, 'View beneficiaries, depots, repayments and reports', 'Read-only (cannot edit or disburse)'];
  } else {
    perms = [`Register and profile members in ${dn}`, 'Build depot rosters', 'Cannot see money or disburse'];
  }
  document.getElementById('accPerms').innerHTML = perms.map(p =>
    `<div class="acc-p"><svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>${p}</div>`).join('');
}
fillAccess();

async function saveName() {
  const name = document.getElementById('sName').value.trim();
  if (!name) { showToast('Name cannot be empty', 'error'); return; }
  const btn = document.getElementById('saveNameBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Saving...';
  try {
    const data = await apiFetch('/api/auth/account', { method: 'PUT', body: { name } });
    Auth.set(data.user, data.token);
    buildSidebar('settings');
    fillProfile();
    showToast('Name updated');
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Save Name';
  }
}

async function savePassword() {
  const currentPassword = document.getElementById('sCurrent').value;
  const newPassword     = document.getElementById('sNew').value;
  const confirm         = document.getElementById('sConfirm').value;
  if (!currentPassword) { showToast('Enter your current password', 'error'); return; }
  if (!newPassword || newPassword.length < 6) { showToast('New password must be at least 6 characters', 'error'); return; }
  if (newPassword !== confirm) { showToast('New passwords do not match', 'error'); return; }
  const btn = document.getElementById('savePwBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Saving...';
  try {
    const data = await apiFetch('/api/auth/account', { method: 'PUT', body: { currentPassword, newPassword } });
    Auth.set(data.user, data.token);
    document.getElementById('sCurrent').value = '';
    document.getElementById('sNew').value = '';
    document.getElementById('sConfirm').value = '';
    showToast('Password updated');
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg> Update Password';
  }
}
</script>
</body>
</html>

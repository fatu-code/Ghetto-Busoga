<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Beneficiary Profile — BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
.qr-card{
  background:#1a2e22;
  border-radius:var(--radius);
  padding:24px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}
.qr-wrap{
  background:#fff;
  border-radius:12px;
  padding:14px;
  display:inline-block;
}
.qr-wrap img{width:200px;height:200px;display:block}
.qr-label{font-family:var(--font2);font-size:.72rem;font-weight:700;color:rgba(255,255,255,.45);line-height:1.6;max-width:240px}
.qr-id{font-family:var(--font);font-size:1.1rem;color:#fff;letter-spacing:.05em}
.qr-url{font-family:var(--font2);font-size:.62rem;font-weight:700;color:rgba(179,230,200,.5);word-break:break-all;max-width:240px}
.print-btn{width:100%;height:38px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--radius-sm);color:rgba(255,255,255,.7);font-family:var(--font2);font-size:.75rem;font-weight:800;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.print-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.print-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.loan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:8px}
.lg{background:var(--bg);border-radius:10px;padding:10px 12px}
.lg-l{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.lg-v{font-family:var(--font);font-size:1rem;color:var(--text);margin-top:4px}
.loan-bar{height:8px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:14px}
.loan-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .5s}
.loan-bar-lbl{font-family:var(--font2);font-size:.66rem;font-weight:700;color:var(--muted);margin-top:6px}
.rp-head{font-family:var(--font2);font-weight:800;font-size:.78rem;color:var(--text);margin:16px 0 6px;padding-top:14px;border-top:1px solid var(--border)}
.rp-row{display:flex;justify-content:space-between;font-family:var(--font2);font-size:.78rem;font-weight:600;color:var(--text);padding:7px 0;border-bottom:1px solid var(--border)}
.rp-row:last-child{border-bottom:none}
.rp-row span:last-child{font-family:var(--font);font-weight:800;color:var(--green)}
.rp-empty{font-family:var(--font2);font-size:.74rem;color:var(--muted);padding:6px 0}
/* Loan Agreement generator tab */
.agr-wrap{max-width:840px;margin:0 auto}
.agr-actionbar{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;flex-wrap:wrap}
.aa-title{font-family:var(--font);font-size:1rem;color:var(--text)}
.aa-sub{font-family:var(--font2);font-size:.76rem;font-weight:600;color:var(--muted);margin-top:2px}
.agr-doc{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.agr-banner{background:linear-gradient(125deg,#16271d,#0c4a2b 55%,#0a7a3a);color:#fff;padding:22px 26px;display:flex;align-items:center;gap:14px}
.agr-banner img{width:46px;height:46px;object-fit:contain;flex-shrink:0}
.agr-prog{font-family:var(--font);font-size:1.05rem;line-height:1.15}
.agr-doctype{font-family:var(--font2);font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.22em;color:rgba(255,255,255,.6);margin-top:6px}
.agr-content{padding:24px 26px}
.agr-intro{font-family:var(--font2);font-size:.84rem;color:var(--text);line-height:1.7;margin-bottom:18px}
.agr-parties{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px}
.agr-party{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:15px 17px}
.agr-party-role{font-family:var(--font2);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--green-dark)}
.agr-party-name{font-family:var(--font);font-size:1.02rem;color:var(--text);margin:5px 0 8px;text-transform:uppercase;line-height:1.15}
.agr-party-meta{font-family:var(--font2);font-size:.74rem;font-weight:600;color:var(--muted);line-height:1.7}
.agr-block{margin-top:22px}
.agr-block-h{font-family:var(--font2);font-weight:900;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.agr-block-h::before{content:"";width:3px;height:14px;background:var(--green);border-radius:2px}
.agr-terms{margin:0;padding-left:20px;display:grid;gap:9px}
.agr-terms li{font-family:var(--font2);font-size:.8rem;font-weight:600;color:var(--text);line-height:1.6}
.agr-pending{margin-top:12px;background:#fff5e6;border:1px solid #ffd699;border-radius:10px;padding:11px 14px;font-family:var(--font2);font-size:.74rem;font-weight:700;color:#b06a00;line-height:1.5}
.agr-sign-note{font-family:var(--font2);font-size:.78rem;font-weight:600;color:var(--muted);line-height:1.6}
@media(max-width:680px){.agr-parties{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <a href="members.html" style="font-family:var(--font2);font-size:.7rem;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:1px">
            <svg viewBox="0 0 16 16" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M10 4l-4 4 4 4"/></svg>
            Beneficiaries
          </a>
          <div class="topbar-title" id="profileNameBar">Loading...</div>
        </div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>

    <div class="content" id="profileContent">
      <div class="empty-state"><div class="empty-title">Loading… (BUILD V2)</div></div>
    </div>

  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-card" style="max-width:600px">
    <div class="modal-head">
      <div class="modal-title">Edit Beneficiary</div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div id="editPhotoPreview" style="width:60px;height:60px;border-radius:12px;background:#1a2e22;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:1.2rem;color:rgba(179,230,200,.6);flex-shrink:0;overflow:hidden;cursor:pointer" onclick="document.getElementById('editPhotoInput').click()"></div>
        <div>
          <div style="font-family:var(--font2);font-size:.78rem;font-weight:800;color:var(--text);margin-bottom:2px">Update Photo</div>
          <div style="font-family:var(--font2);font-size:.68rem;color:var(--muted);margin-bottom:6px">Click to change photo</div>
          <input type="file" id="editPhotoInput" accept="image/*" style="display:none" onchange="previewEditPhoto(this)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="eName"></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="ePhone"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">National ID (NIN) *</label><input class="form-input" id="eNin" maxlength="14" oninput="this.value=this.value.toUpperCase()"></div>
        <div class="form-group"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">District *</label><select class="form-select" id="eDistrict" onchange="updateEditSubCounties()"><option value="">Select</option></select></div>
        <div class="form-group"><label class="form-label">Depot (Ghetto Cell) *</label><select class="form-select" id="eDepot"><option value="">Select</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Sub-County</label><select class="form-select" id="eSubCounty" onchange="updateEditParishes()"><option value="">Select</option></select></div>
        <div class="form-group"><label class="form-label">Parish</label><select class="form-select" id="eParish"><option value="">Select</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Village</label><input class="form-input" id="eVillage"></div>
        <div class="form-group"><label class="form-label">Gender</label><select class="form-select" id="eGender"><option value="">Select</option><option>Male</option><option>Female</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Amount (UGX) *</label><input class="form-input" id="eAmount" type="text" inputmode="numeric" oninput="fmtMoney(this)"></div>
        <div class="form-group"><label class="form-label">Disbursement Date</label><input class="form-input" id="eDate" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="eStatus"><option>Active</option><option>Inactive</option><option>Suspended</option></select></div>
        <div class="form-group"><label class="form-label">Depot Role</label><select class="form-select" id="eRole"><option value="">Member (no position)</option><option>Chairperson</option><option>Vice Chairperson</option><option>Treasurer</option><option>Secretary</option><option>Publicity</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="eNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-red btn-sm" onclick="confirmDelete()">Delete</button>
      <button class="btn" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-green" id="eSaveBtn" onclick="saveEdit()">
        <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
        Save Changes
      </button>
    </div>
  </div>
</div>

<!-- DISBURSEMENT MODAL -->
<div class="modal-bg" id="disburseModal">
  <div class="modal-card" style="max-width:440px">
    <div class="modal-head">
      <div class="modal-title">Record Disbursement</div>
      <button class="modal-close" onclick="closeModal('disburseModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-family:var(--font2);font-size:.78rem;color:var(--muted);line-height:1.55;margin-bottom:14px">Record the money received by this profiled depot member. It will show on their profile and card, and mark them as Disbursed.</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Amount Received (UGX) *</label><input class="form-input" id="dAmount" type="text" inputmode="numeric" oninput="fmtMoney(this)" placeholder="e.g. 300,000"></div>
        <div class="form-group"><label class="form-label">Disbursement Date *</label><input class="form-input" id="dDate" type="date"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('disburseModal')">Cancel</button>
      <button class="btn btn-green" id="dSaveBtn" onclick="saveDisbursement()">
        <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
        Save Disbursement
      </button>
    </div>
  </div>
</div>

<!-- REPAYMENT MODAL -->
<div class="modal-bg" id="repayModal">
  <div class="modal-card" style="max-width:440px">
    <div class="modal-head">
      <div class="modal-title">Record Repayment</div>
      <button class="modal-close" onclick="closeModal('repayModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="repayInfo" style="font-family:var(--font2);font-size:.78rem;color:var(--muted);line-height:1.55;margin-bottom:14px"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Amount Repaid (UGX) *</label><input class="form-input" id="rAmount" type="text" inputmode="numeric" oninput="fmtMoney(this)" placeholder="e.g. 50,000"></div>
        <div class="form-group"><label class="form-label">Date Paid *</label><input class="form-input" id="rDate" type="date"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('repayModal')">Cancel</button>
      <button class="btn btn-green" id="rSaveBtn" onclick="saveRepayment()">
        <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
        Save Repayment
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script src="js/locations.js"></script>
<script src="js/depots.js"></script>
<script src="js/member.js"></script>
</body>
</html>

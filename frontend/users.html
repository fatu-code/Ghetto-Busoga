<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Staff - BGS</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://backend-ghetto-busoga-production.up.railway.app" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
.u-av{width:34px;height:34px;border-radius:9px;background:var(--green-pale);border:1.5px solid var(--green-mid);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:800;font-size:.75rem;color:var(--green-dark);flex-shrink:0}
/* Team hero */
.mu-hero{background:linear-gradient(125deg,#16271d 0%,#0c4a2b 55%,#0a7a3a 100%);border-radius:18px;padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative;overflow:hidden;flex-wrap:wrap}
.mu-hero::after{content:"";position:absolute;right:-50px;top:-70px;width:230px;height:230px;border-radius:50%;background:rgba(255,255,255,.05)}
.mu-hero::before{content:"";position:absolute;top:0;left:-60%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.10),transparent);transform:skewX(-18deg);pointer-events:none;animation:muShimmer 6.5s ease-in-out infinite}
@keyframes muShimmer{0%{left:-60%}60%{left:135%}100%{left:135%}}
.mu-hero-l{display:flex;align-items:center;gap:14px;position:relative;min-width:0}
.mu-hero-ic{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mu-hero-ic svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.mu-hero-t{font-family:var(--font);font-size:1.3rem;color:#fff;line-height:1.1}
.mu-hero-s{font-family:var(--font2);font-size:.74rem;font-weight:600;color:rgba(255,255,255,.6);margin-top:3px}
.mu-hero-fig{text-align:right;position:relative}
.mu-hero-fig .n{font-family:var(--font);font-size:2rem;line-height:1}
.mu-hero-fig span{font-family:var(--font2);font-size:.68rem;font-weight:700;color:rgba(255,255,255,.55)}

/* Role tiles */
.mu-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.mu-card{position:relative;overflow:hidden;background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:15px 16px 15px 19px;display:flex;align-items:center;gap:13px;transition:all .16s;animation:muRise .5s var(--ease) backwards}
.mu-card:hover{border-color:var(--green-mid);box-shadow:0 10px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
.mu-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.mu-card.amb::before{background:var(--amber)}.mu-card.blue::before{background:#3b82f6}
.mu-card:nth-child(2){animation-delay:.07s}.mu-card:nth-child(3){animation-delay:.14s}
@keyframes muRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mu-ic{width:40px;height:40px;border-radius:11px;background:var(--green-pale);border:1.5px solid var(--green-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mu-ic svg{width:18px;height:18px;fill:none;stroke:var(--green-dark);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.mu-card.amb .mu-ic{background:var(--amber-pale);border-color:var(--amber-mid)}.mu-card.amb .mu-ic svg{stroke:var(--amber)}
.mu-card.blue .mu-ic{background:var(--blue-pale);border-color:var(--blue-mid)}.mu-card.blue .mu-ic svg{stroke:#3b82f6}
.mu-v{font-family:var(--font);font-size:1.5rem;color:var(--text);line-height:1}
.mu-l{font-family:var(--font2);font-size:.64rem;font-weight:800;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
@media (prefers-reduced-motion:reduce){.mu-hero::before{animation:none}.mu-card{animation:none}}
/* Subtle delete link (tucked in the edit modal, pushed to the far left) */
.u-del-link{margin-right:auto;border-color:transparent;background:none;color:var(--muted);padding-left:0}
.u-del-link:hover{border-color:#f5b7b1;background:#fdecec;color:#c0392b}
.del-warn{width:40px;height:40px;border-radius:11px;background:#fdecec;border:1.5px solid #f5b7b1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.del-warn svg{width:19px;height:19px;fill:none;stroke:#c0392b;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="app-shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-area">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <button class="mob-sidebar-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
        </button>
        <div>
          <div class="topbar-title">Manage Users</div>
          <div class="topbar-sub" id="countLabel">Loading...</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green" id="addBtn" onclick="openAdd()">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
          <span class="mob-hide">Create User</span>
        </button>
      </div>
    </div>

    <div class="content">
      <div id="usersContainer">
        <div class="card"><div class="empty-state"><div class="empty-title">Loading…</div></div></div>
      </div>
    </div>

  </div>
</div>

<!-- ADD / EDIT STAFF MODAL -->
<div class="modal-bg" id="userModal">
  <div class="modal-card" style="max-width:460px">
    <div class="modal-head">
      <div class="modal-title" id="uModalTitle">Add Staff</div>
      <button class="modal-close" onclick="closeModal('userModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="uName"></div>
        <div class="form-group"><label class="form-label">Username *</label><input class="form-input" id="uUsername" oninput="this.value=this.value.toLowerCase()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label" id="uPwLabel">Password *</label><input class="form-input" id="uPassword" type="password" autocomplete="new-password"></div>
        <div class="form-group"><label class="form-label">Role</label><select class="form-select" id="uRole" onchange="toggleDistrict()"><option value="profiler">Profiler</option><option value="rdc">RDC</option><option value="admin">Administrator</option></select></div>
      </div>
      <div class="form-row" id="uDistrictWrap">
        <div class="form-group"><label class="form-label">Assigned District *</label><select class="form-select" id="uDistrict"><option value="">Select district</option></select></div>
        <div class="form-group"></div>
      </div>
      <div style="font-family:var(--font2);font-size:.72rem;color:var(--muted);line-height:1.6">
        <strong>Administrator</strong> - full access, all 12 districts.<br>
        <strong>RDC</strong> - view-only oversight of one district.<br>
        <strong>Profiler</strong> - registers people in one district, never sees money.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-sm u-del-link" id="uDeleteBtn" style="display:none" onclick="askDelete()">
        <svg viewBox="0 0 16 16"><path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/></svg>
        Delete account
      </button>
      <button class="btn" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-green" id="uSaveBtn" onclick="saveUser()">
        <svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>
        Save
      </button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRMATION MODAL -->
<div class="modal-bg" id="delConfirmModal">
  <div class="modal-card" style="max-width:420px">
    <div class="modal-head">
      <div class="modal-title">Delete account</div>
      <button class="modal-close" onclick="closeModal('delConfirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:13px;align-items:flex-start">
        <div class="del-warn"><svg viewBox="0 0 16 16"><path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/></svg></div>
        <div id="delMsg" style="font-family:var(--font2);font-size:.84rem;color:var(--text);line-height:1.6"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('delConfirmModal')">Cancel</button>
      <button class="btn btn-red" id="delConfirmBtn" onclick="confirmDelete()">
        <svg viewBox="0 0 16 16"><path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/></svg>
        Delete
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
Auth.guard(['admin'], 'depots.html');
buildSidebar('staff');
const me = Auth.get() || {};
let users = [], editId = null, muIntro = false;

// Fill the assigned-district dropdown.
DISTRICTS.forEach(d => {
  const o = document.createElement('option');
  o.value = d.code; o.textContent = d.name;
  document.getElementById('uDistrict').appendChild(o);
});

function roleName(r) { return r === 'admin' ? 'Administrator' : r === 'rdc' ? 'RDC' : 'Profiler'; }
// Al-Hajj Faruk Kirunda shows as Chief Coordinator rather than Administrator.
function displayRole(u) {
  if (u.role === 'admin' && /kirunda|faruk/i.test(u.name || '')) return 'Chief Coordinator';
  return roleName(u.role);
}
function districtName(code) { const d = DISTRICTS.find(x => x.code === code); return d ? d.name : (code || ''); }
// Admins have no district; show the picker only for RDC / Profiler.
function toggleDistrict() {
  const isAdmin = document.getElementById('uRole').value === 'admin';
  document.getElementById('uDistrictWrap').style.display = isAdmin ? 'none' : '';
}

async function loadUsers() {
  try {
    const data = await apiFetch('/api/users');
    users = data.users || [];
    render();
  } catch (e) {
    document.getElementById('usersContainer').innerHTML =
      `<div class="card"><div class="empty-state"><div class="empty-title">Administrators only</div><div class="empty-sub">${e.message}</div></div></div>`;
    document.getElementById('countLabel').textContent = '';
    const ab = document.getElementById('addBtn'); if (ab) ab.style.display = 'none';
  }
}

function render() {
  const total  = users.length;
  const admins = users.filter(u => u.role === 'admin').length;
  const rdcs   = users.filter(u => u.role === 'rdc').length;
  const profs  = users.filter(u => u.role === 'profiler').length;
  document.getElementById('countLabel').textContent = `${total} user${total === 1 ? '' : 's'}`;
  const stats = `
    <div class="mu-hero">
      <div class="mu-hero-l">
        <div class="mu-hero-ic"><svg viewBox="0 0 16 16"><circle cx="5.5" cy="5" r="2.3"/><path d="M1.5 13.5c0-2.4 1.8-4 4-4s4 1.6 4 4"/><circle cx="11.5" cy="5.5" r="1.8"/><path d="M10 9.7c2 .1 3.4 1.5 3.4 3.8"/></svg></div>
        <div><div class="mu-hero-t">Team &amp; Access</div><div class="mu-hero-s">Everyone who can sign in to Busoga Ghetto Structure</div></div>
      </div>
      <div class="mu-hero-fig"><div class="n cup" data-to="${total}">${total}</div><span>${total === 1 ? 'person' : 'people'} with access</span></div>
    </div>
    <div class="mu-stats">
      <div class="mu-card"><div class="mu-ic"><svg viewBox="0 0 16 16"><path d="M8 1.5l5 2v4c0 3.5-2.5 5.6-5 6.5-2.5-.9-5-3-5-6.5v-4z"/><path d="M5.8 8l1.6 1.6L10.4 6.6"/></svg></div><div><div class="mu-v cup" data-to="${admins}">${admins}</div><div class="mu-l">Administrators</div></div></div>
      <div class="mu-card amb"><div class="mu-ic"><svg viewBox="0 0 16 16"><path d="M1 8s2.5-4.5 7-4.5S15 8 15 8s-2.5 4.5-7 4.5S1 8 1 8z"/><circle cx="8" cy="8" r="1.8"/></svg></div><div><div class="mu-v cup" data-to="${rdcs}">${rdcs}</div><div class="mu-l">RDCs</div></div></div>
      <div class="mu-card blue"><div class="mu-ic"><svg viewBox="0 0 16 16"><circle cx="6" cy="5" r="2.5"/><path d="M1.5 13c0-2.8 2-5 4.5-5s4.5 2.2 4.5 5"/><path d="M12.5 6v4M10.5 8h4"/></svg></div><div><div class="mu-v cup" data-to="${profs}">${profs}</div><div class="mu-l">Profilers</div></div></div>
    </div>`;
  document.getElementById('usersContainer').innerHTML = stats + `<div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Added</th><th></th></tr></thead>
    <tbody>${users.map(u => `
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="u-av">${initials(u.name)}</div><div style="font-weight:800">${u.name}${u.id === me.id ? ' <span style="color:var(--muted);font-weight:600">(you)</span>' : ''}</div></div></td>
        <td style="color:var(--muted)">@${u.username}</td>
        <td>
          <span class="pill ${u.role === 'admin' ? 'pill-green' : u.role === 'rdc' ? 'pill-amber' : 'pill-gray'}">${displayRole(u)}</span>
          ${u.district ? `<div style="font-size:.68rem;color:var(--muted);margin-top:4px;font-weight:700">${districtName(u.district)}</div>` : ''}
        </td>
        <td style="color:var(--muted)">${formatDate(u.created_at)}</td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-sm" onclick="openEdit(${u.id})">Edit</button>
        </td>
      </tr>`).join('')}</tbody>
  </table></div></div>`;

  // Count the figures up once on first load (not on every re-render).
  if (!muIntro) {
    muIntro = true;
    requestAnimationFrame(() => document.querySelectorAll('.cup').forEach(animateUp));
  }
}

// Count a number up from zero, honouring reduced-motion.
function animateUp(el) {
  const to = Number(el.dataset.to) || 0;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) { el.textContent = to; return; }
  const dur = 800, start = performance.now();
  function tick(now) {
    const p = Math.min(1, (now - start) / dur), e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(to * e);
    if (p < 1) requestAnimationFrame(tick); else el.textContent = to;
  }
  requestAnimationFrame(tick);
}

function openAdd() {
  editId = null;
  document.getElementById('uModalTitle').textContent = 'Create User';
  document.getElementById('uName').value = '';
  document.getElementById('uUsername').value = '';
  document.getElementById('uUsername').disabled = false;
  document.getElementById('uPassword').value = '';
  document.getElementById('uPassword').placeholder = 'At least 6 characters';
  document.getElementById('uPwLabel').textContent = 'Password *';
  document.getElementById('uRole').value = 'profiler';
  document.getElementById('uDistrict').value = '';
  document.getElementById('uDeleteBtn').style.display = 'none';
  toggleDistrict();
  openModal('userModal');
}
function openEdit(id) {
  const u = users.find(x => x.id === id); if (!u) return;
  editId = id;
  document.getElementById('uModalTitle').textContent = 'Edit User';
  document.getElementById('uName').value = u.name;
  document.getElementById('uUsername').value = u.username;
  document.getElementById('uUsername').disabled = true;
  document.getElementById('uPassword').value = '';
  document.getElementById('uPassword').placeholder = 'Leave blank to keep current';
  document.getElementById('uPwLabel').textContent = 'New Password';
  document.getElementById('uRole').value = ['admin', 'rdc', 'profiler'].includes(u.role) ? u.role : 'profiler';
  document.getElementById('uDistrict').value = u.district || '';
  // You can't delete your own account; hide the option when editing yourself.
  document.getElementById('uDeleteBtn').style.display = (id === me.id) ? 'none' : '';
  toggleDistrict();
  openModal('userModal');
}

async function saveUser() {
  const name     = document.getElementById('uName').value.trim();
  const username = document.getElementById('uUsername').value.trim().toLowerCase();
  const password = document.getElementById('uPassword').value;
  const role     = document.getElementById('uRole').value;
  const district = role === 'admin' ? null : document.getElementById('uDistrict').value;
  if (!name || (!editId && !username)) { showToast('Name and username are required', 'error'); return; }
  if (!editId && (!password || password.length < 6)) { showToast('Password must be at least 6 characters', 'error'); return; }
  if (editId && password && password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
  if (role !== 'admin' && !district) { showToast('Choose the district for this RDC or Profiler', 'error'); return; }

  const btn = document.getElementById('uSaveBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Saving...';
  try {
    if (editId) {
      const body = { name, role, district }; if (password) body.password = password;
      await apiFetch(`/api/users/${editId}`, { method: 'PUT', body });
      showToast('User updated');
    } else {
      await apiFetch('/api/users', { method: 'POST', body: { name, username, password, role, district } });
      showToast('User added');
    }
    closeModal('userModal');
    loadUsers();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M2 8l4 4 8-8"/></svg>Save';
  }
}

// Open the confirmation modal for the account currently being edited.
let pendingDelete = null;
function askDelete() {
  const u = users.find(x => x.id === editId); if (!u) return;
  pendingDelete = u;
  closeModal('userModal');
  document.getElementById('delMsg').innerHTML =
    `Delete the account for <b>${u.name}</b> (@${u.username})?<br><br>They will no longer be able to sign in. This cannot be undone. Records they created stay in the system.`;
  openModal('delConfirmModal');
}

async function confirmDelete() {
  if (!pendingDelete) return;
  const btn = document.getElementById('delConfirmBtn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Deleting...';
  try {
    await apiFetch(`/api/users/${pendingDelete.id}`, { method: 'DELETE' });
    closeModal('delConfirmModal');
    showToast('User deleted');
    pendingDelete = null;
    loadUsers();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M3 4.5h10M6 4.5V2.5h4v2M4.5 4.5l.6 9h5.8l.6-9"/></svg> Delete';
  }
}

loadUsers();
</script>
</body>
</html>
